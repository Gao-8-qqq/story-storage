<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>創作管理アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #F8F9FA; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
    textarea:focus, input:focus, select:focus { outline: none; }
    input, select, textarea { font-size: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ===== SUPABASE =====
const SUPABASE_URL = "https://odbbqlyxbuzgbkeuohfq.supabase.co";
const SUPABASE_KEY = "sb_publishable_OyA6NcZ1gAm4mcU7A0eEpg_xhDiXY6N";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== UTILS =====
const uid = () => `${Date.now()}_${Math.random().toString(36).slice(2,9)}`;
const charName = (ch) => { if (!ch) return "（不明）"; const n = ch.nameOrder === "last_first" ? `${ch.lastName} ${ch.firstName}` : `${ch.firstName} ${ch.lastName}`; return n.trim() || "（無名）"; };
const calcAge = (birth, target) => { if (!birth || !target) return null; const b = new Date(birth), t = new Date(target); let age = t.getFullYear() - b.getFullYear(); const m = t.getMonth() - b.getMonth(); if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--; return age >= 0 ? age : null; };
const compressImage = (dataUrl) => new Promise(resolve => { const img = new Image(); img.onload = () => { const max = 800; let w = img.width, h = img.height; if (w > max || h > max) { if (w > h) { h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; } } const c = document.createElement("canvas"); c.width = w; c.height = h; c.getContext("2d").drawImage(img, 0, 0, w, h); resolve(c.toDataURL("image/jpeg", 0.82)); }; img.src = dataUrl; });

const norm = (d) => {
  if (!d) d = {};
  const mkChar = c => ({ image: "", imageColor: "#8EA3C3", genderId: "", birthday: "", deathDate: "", notes: "", lastName: "", firstName: "", lastNameFuri: "", firstNameFuri: "", nameOrder: "last_first", relatedCharacters: [], relatedGroups: [], relatedTerms: [], parameters: [], ...c, relatedCharacters: (c.relatedCharacters || []).map(r => r && typeof r === "object" && r.charId ? r : { charId: r && r.charId ? r.charId : r, callName: (r && r.callName) || "", calledName: (r && r.calledName) || "" }), relatedGroups: (c.relatedGroups || []).map(r => r && typeof r === "object" && r.groupId ? r : { groupId: r && r.groupId ? r.groupId : r, position: (r && r.position) || "" }) });
  return { storyTitle: d.storyTitle || "新しいストーリー", storySynopsis: d.storySynopsis || "", characters: (d.characters || []).map(mkChar), groups: (d.groups || []).map(g => ({ name: "", description: "", notes: "", relatedCharacters: [], ...g, relatedCharacters: (g.relatedCharacters || []).map(r => typeof r === "object" ? (r.charId || r.id || "") : r).filter(Boolean) })), locations: d.locations || [], scenes: (d.scenes || []).map(s => ({ title: "", startDate: "", endDate: "", relatedChapterId: "", relatedLocationId: "", script: "", notes: "", relatedCharacters: [], relatedTerms: [], ...s })), chapters: (d.chapters || []).map(c => ({ title: "", notes: "", relatedScenes: [], ...c })), terms: d.terms || [], genders: d.genders || [{ id: uid(), name: "男性", color: "#5B9BD5" }, { id: uid(), name: "女性", color: "#D9618A" }, { id: uid(), name: "その他", color: "#888" }], parameters: d.parameters || [] };
};

// ===== THEME =====
const C = { bg: "#F8F9FA", surface: "#FFFFFF", border: "#E4E7EB", borderL: "#F0F2F5", text: "#111827", sub: "#6B7280", hint: "#9CA3AF", accent: "#1F2937", accentFg: "#FFF", tag: "#F3F4F6", tagTxt: "#4B5563", danger: "#EF4444" };

// ===== ICONS =====
const Ico = ({ n, s = 20, c = "currentColor", sw = 1.5 }) => {
  const d = { person: <><circle cx="12" cy="8" r="4"/><path d="M4 20v-1a8 8 0 0116 0v1"/></>, group: <><path d="M17 21v-1a5 5 0 00-10 0v1"/><circle cx="12" cy="9" r="4"/><path d="M22 21v-.5a4 4 0 00-3-3.85M2 21v-.5a4 4 0 013-3.85"/><circle cx="20" cy="7" r="3"/><circle cx="4" cy="7" r="3"/></>, pin: <><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></>, scene: <><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4M9 8.5l5 2.5-5 2.5V8.5z"/></>, book: <><path d="M4 19.5A2.5 2.5 0 016.5 17H20V2H6.5A2.5 2.5 0 004 4.5v15z"/><path d="M8 7h8M8 11h8M8 15h5"/></>, term: <><path d="M4 6h16M4 11h12M4 16h8"/></>, gender: <><circle cx="10" cy="13" r="5"/><path d="M15 8l5-5M18 3h3v3"/></>, param: <><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="9" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="1.5" fill="currentColor" stroke="none"/></>, plus: <path d="M12 5v14M5 12h14"/>, back: <path d="M19 12H5M11 6l-6 6 6 6"/>, x: <path d="M18 6L6 18M6 6l12 12"/>, edit: <path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/>, trash: <><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>, settings: <><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></>, timeline: <><path d="M2 12h20"/><circle cx="6" cy="12" r="2.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="2.5" fill="currentColor" stroke="none"/><path d="M6 4v5M12 4v5M18 4v5M6 15v5M12 15v5M18 15v5"/></>, check: <path d="M20 6L9 17l-5-5"/>, chevR: <path d="M9 18l6-6-6-6"/>, chevU: <path d="M18 15l-6-6-6 6"/>, chevD: <path d="M6 9l6 6 6-6"/>, save: <><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></>, camera: <><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></>, download: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>, upload: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>, logout: <><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></> };
  return <svg viewBox="0 0 24 24" width={s} height={s} fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d[n] || null}</svg>;
};

// ===== BASE UI =====
const Tag = ({ label, color, onRemove }) => (<span style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px", borderRadius: 20, fontSize: 11, background: color ? color + "22" : C.tag, color: color || C.tagTxt, border: `1px solid ${color || C.border}`, fontWeight: 500 }}>{label}{onRemove && <button onClick={onRemove} style={{ border: "none", background: "transparent", padding: 0, cursor: "pointer", display: "flex", opacity: 0.5, lineHeight: 0 }}><Ico n="x" s={9} c="currentColor"/></button>}</span>);
const Lbl = ({ children }) => <div style={{ fontSize: 11, color: C.sub, marginBottom: 4, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.4px" }}>{children}</div>;
const Field = ({ label, children, mb = 14 }) => <div style={{ marginBottom: mb }}>{label && <Lbl>{label}</Lbl>}{children}</div>;
const IS = { width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14, color: C.text, background: C.surface, boxSizing: "border-box", outline: "none", fontFamily: "inherit" };
const Inp = ({ label, value, onChange, type = "text", placeholder, rows }) => <Field label={label}>{rows ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...IS, resize: "vertical" }}/> : <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={IS}/>}</Field>;
const Sel = ({ label, value, onChange, options }) => <Field label={label}><select value={value} onChange={e => onChange(e.target.value)} style={{ ...IS, cursor: "pointer" }}><option value="">-- 未選択 --</option>{options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></Field>;
const Btn = ({ children, onClick, variant = "default", small, icon, full }) => { const vs = { default: { bg: C.surface, cl: C.text, br: `1px solid ${C.border}` }, primary: { bg: C.accent, cl: C.accentFg, br: "none" }, danger: { bg: C.danger, cl: "#fff", br: "none" }, ghost: { bg: "transparent", cl: C.sub, br: "none" } }; const v = vs[variant] || vs.default; return <button onClick={onClick} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: small ? "5px 10px" : "9px 14px", borderRadius: 8, border: v.br, background: v.bg, color: v.cl, fontSize: small ? 12 : 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", width: full ? "100%" : "auto", justifyContent: full ? "center" : "flex-start" }}>{icon && <Ico n={icon} s={small ? 13 : 15} c={v.cl}/>}{children}</button>; };
const Divider = () => <div style={{ height: 1, background: C.border, margin: "12px 0" }}/>;

// ===== LOGIN SCREEN =====
const LoginScreen = () => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [mode, setMode] = useState("login");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [isError, setIsError] = useState(false);

  const handle = async () => {
    if (!email || !password) { setMsg("メールアドレスとパスワードを入力してください"); setIsError(true); return; }
    setLoading(true); setMsg("");
    if (mode === "login") {
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) { setMsg("ログインに失敗しました。メールアドレスとパスワードを確認してください。"); setIsError(true); }
    } else {
      const { error } = await db.auth.signUp({ email, password });
      if (error) { setMsg(error.message); setIsError(true); }
      else { setMsg("アカウントを作成しました！そのままログインできます。"); setIsError(false); }
    }
    setLoading(false);
  };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.bg, padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 360, background: C.surface, borderRadius: 16, padding: 28, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 4 }}>創作管理アプリ</div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 24 }}>{mode === "login" ? "ログイン" : "新規登録"}</div>
        <Inp label="メールアドレス" value={email} onChange={setEmail} type="email" placeholder="example@email.com"/>
        <Inp label="パスワード" value={password} onChange={setPassword} type="password" placeholder="6文字以上"/>
        {msg && <div style={{ fontSize: 12, color: isError ? C.danger : "#10B981", marginBottom: 12, lineHeight: 1.5 }}>{msg}</div>}
        <Btn variant="primary" full onClick={handle}>{loading ? "処理中..." : mode === "login" ? "ログイン" : "登録する"}</Btn>
        <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setMsg(""); }} style={{ marginTop: 14, width: "100%", background: "none", border: "none", color: C.hint, fontSize: 12, cursor: "pointer", textAlign: "center", fontFamily: "inherit" }}>
          {mode === "login" ? "アカウントをお持ちでない方 → 新規登録" : "すでにアカウントをお持ちの方 → ログイン"}
        </button>
      </div>
    </div>
  );
};

// ===== IMAGE UPLOAD =====
const ImageUpload = ({ value, onChange }) => { const ref = useRef(); return (<Field label="キャラクター画像"><div style={{ display: "flex", gap: 12, alignItems: "center" }}><div onClick={() => ref.current.click()} style={{ width: 72, height: 72, borderRadius: 12, border: `2px dashed ${value ? "transparent" : C.border}`, overflow: "hidden", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", background: value ? "transparent" : C.bg, flexShrink: 0 }}>{value ? <img src={value} style={{ width: "100%", height: "100%", objectFit: "cover" }}/> : <Ico n="camera" s={22} c={C.hint}/>}</div><div style={{ display: "flex", flexDirection: "column", gap: 6 }}><Btn small onClick={() => ref.current.click()} icon="camera">{value ? "変更" : "画像を選択"}</Btn>{value && <Btn small variant="ghost" onClick={() => onChange("")}>削除</Btn>}</div><input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = async ev => onChange(await compressImage(ev.target.result)); r.readAsDataURL(f); e.target.value = ""; }}/></div></Field>); };

// ===== ADDITIVE LINKER =====
const AdditiveLinker = ({ available, onAdd, getLabel, getColor, placeholder = "追加して紐付け" }) => {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const filtered = available.filter(x => getLabel(x).includes(q));
  const close = () => { setOpen(false); setQ(""); };
  return (<><button onClick={() => setOpen(true)} style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", padding: "9px 12px", border: `1.5px dashed ${C.border}`, borderRadius: 9, background: "transparent", color: C.hint, cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}><Ico n="plus" s={14} c={C.hint}/>{placeholder}</button>{open && (<div style={{ position: "fixed", inset: 0, zIndex: 2000, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={e => { if (e.target === e.currentTarget) close(); }}><div style={{ background: C.surface, borderRadius: "14px 14px 0 0", width: "100%", maxWidth: 500, maxHeight: "65vh", display: "flex", flexDirection: "column" }}><div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 14px 10px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}><input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="検索..." style={{ flex: 1, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 10px", fontSize: 14, color: C.text, fontFamily: "inherit", outline: "none", background: C.bg }}/><button onClick={close} style={{ border: "none", background: "transparent", cursor: "pointer", padding: 4, display: "flex" }}><Ico n="x" s={18} c={C.sub}/></button></div><div style={{ overflowY: "auto", flex: 1 }}>{filtered.length === 0 ? <div style={{ textAlign: "center", padding: "28px 0", color: C.hint, fontSize: 13 }}>{available.length === 0 ? "追加できるデータがありません" : "見つかりません"}</div> : filtered.map(x => (<div key={x.id} onClick={() => { onAdd(x.id); close(); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", borderBottom: `1px solid ${C.borderL}`, cursor: "pointer" }}>{getColor && getColor(x) && <div style={{ width: 8, height: 8, borderRadius: "50%", background: getColor(x), flexShrink: 0 }}/>}<span style={{ fontSize: 14, color: C.text, flex: 1 }}>{getLabel(x)}</span><Ico n="plus" s={15} c={C.hint}/></div>))}</div></div></div>)}</>);
};

// ===== RELATION CARDS =====
const CharRelCard = ({ rel, character, onUpdate, onRemove }) => (<div style={{ border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 12px", marginBottom: 6 }}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}><div style={{ display: "flex", alignItems: "center", gap: 7 }}>{character.image ? <img src={character.image} style={{ width: 24, height: 24, borderRadius: "50%", objectFit: "cover" }}/> : <div style={{ width: 24, height: 24, borderRadius: "50%", background: (character.imageColor || "#ccc") + "30", display: "flex", alignItems: "center", justifyContent: "center" }}><Ico n="person" s={13} c={character.imageColor || C.hint}/></div>}<span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{charName(character)}</span></div><button onClick={onRemove} style={{ border: "none", background: "transparent", cursor: "pointer", padding: 3, opacity: 0.4 }}><Ico n="x" s={14} c={C.text}/></button></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><div><Lbl>呼び方</Lbl><input value={rel.callName || ""} onChange={e => onUpdate({ ...rel, callName: e.target.value })} placeholder="相手をどう呼ぶか" style={{ ...IS, fontSize: 12, padding: "5px 8px" }}/></div><div><Lbl>呼ばれ方</Lbl><input value={rel.calledName || ""} onChange={e => onUpdate({ ...rel, calledName: e.target.value })} placeholder="どう呼ばれるか" style={{ ...IS, fontSize: 12, padding: "5px 8px" }}/></div></div></div>);
const GroupRelCard = ({ rel, group, onUpdate, onRemove }) => (<div style={{ border: `1px solid ${C.border}`, borderRadius: 9, padding: "10px 12px", marginBottom: 6 }}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}><div style={{ display: "flex", alignItems: "center", gap: 6 }}><Ico n="group" s={14} c={C.hint}/><span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{group.name || "（無名）"}</span></div><button onClick={onRemove} style={{ border: "none", background: "transparent", cursor: "pointer", padding: 3, opacity: 0.4 }}><Ico n="x" s={14} c={C.text}/></button></div><div><Lbl>立ち位置</Lbl><input value={rel.position || ""} onChange={e => onUpdate({ ...rel, position: e.target.value })} placeholder="例：リーダー、新入り..." style={{ ...IS, fontSize: 12, padding: "5px 8px" }}/></div></div>);

// ===== MODAL / TABS =====
const Modal = ({ title, onClose, children, footer }) => (<div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "flex-end", justifyContent: "center" }}><div style={{ background: C.surface, borderRadius: "14px 14px 0 0", width: "100%", maxWidth: 500, maxHeight: "92vh", display: "flex", flexDirection: "column" }}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px 12px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}><span style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{title}</span><button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex" }}><Ico n="x" s={17} c={C.sub}/></button></div><div style={{ overflowY: "auto", padding: 16, flex: 1 }}>{children}</div>{footer && <div style={{ padding: "10px 16px 18px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8, flexShrink: 0 }}>{footer}</div>}</div></div>);
const Tabs = ({ tabs, active, onChange }) => (<div style={{ display: "flex", gap: 2, marginBottom: 16, background: C.bg, borderRadius: 10, padding: 3 }}>{tabs.map(t => <button key={t.key} onClick={() => onChange(t.key)} style={{ flex: 1, padding: "6px 4px", borderRadius: 8, border: "none", background: active === t.key ? C.surface : "transparent", color: active === t.key ? C.text : C.hint, fontSize: 12, fontWeight: active === t.key ? 600 : 400, cursor: "pointer", fontFamily: "inherit", boxShadow: active === t.key ? "0 1px 3px rgba(0,0,0,0.07)" : "none" }}>{t.label}</button>)}</div>);

// ===== ENTITY CARD / LIST =====
const EntityCard = ({ icon, iconColor, name, subtitle, tags, onClick, onDelete, onMoveUp, onMoveDown, image }) => (<div onClick={onClick} style={{ display: "flex", alignItems: "center", padding: "10px 14px", borderBottom: `1px solid ${C.borderL}`, cursor: "pointer", background: C.surface, gap: 10 }}>{(onMoveUp !== undefined || onMoveDown !== undefined) && (<div style={{ display: "flex", flexDirection: "column", gap: 1, flexShrink: 0 }}><button onClick={e => { e.stopPropagation(); onMoveUp && onMoveUp(); }} style={{ border: "none", background: "transparent", cursor: onMoveUp ? "pointer" : "default", padding: "2px 3px", opacity: onMoveUp ? 0.5 : 0.15, lineHeight: 0 }}><Ico n="chevU" s={13} c={C.text}/></button><button onClick={e => { e.stopPropagation(); onMoveDown && onMoveDown(); }} style={{ border: "none", background: "transparent", cursor: onMoveDown ? "pointer" : "default", padding: "2px 3px", opacity: onMoveDown ? 0.5 : 0.15, lineHeight: 0 }}><Ico n="chevD" s={13} c={C.text}/></button></div>)}<div style={{ width: 38, height: 38, borderRadius: 9, background: iconColor ? iconColor + "18" : C.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, overflow: "hidden" }}>{image ? <img src={image} style={{ width: "100%", height: "100%", objectFit: "cover" }}/> : <Ico n={icon} s={18} c={iconColor || C.hint}/>}</div><div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 1 }}>{name || "（無題）"}</div>{subtitle && <div style={{ fontSize: 11, color: C.sub }}>{subtitle}</div>}{tags && tags.length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 3 }}>{tags.slice(0, 3).map((t, i) => <Tag key={i} label={t.label} color={t.color}/>)}</div>}</div><div style={{ display: "flex", gap: 2, flexShrink: 0, alignItems: "center" }}><button onClick={e => { e.stopPropagation(); onDelete(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 5, display: "flex", opacity: 0.35 }}><Ico n="trash" s={14} c={C.text}/></button><Ico n="chevR" s={15} c={C.hint}/></div></div>);
const EntityList = ({ title, icon, iconColor, items, onAdd, onEdit, onDelete, renderName, renderSubtitle, renderTags, renderImage, onMoveUp, onMoveDown }) => (<div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "13px 16px", borderBottom: `1px solid ${C.border}`, background: C.surface, flexShrink: 0 }}><div style={{ display: "flex", alignItems: "center", gap: 7 }}><Ico n={icon} s={16} c={iconColor || C.hint}/><span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{title}</span><span style={{ fontSize: 11, color: C.hint, background: C.tag, padding: "1px 7px", borderRadius: 10 }}>{items.length}</span></div><button onClick={onAdd} style={{ display: "flex", alignItems: "center", gap: 4, padding: "6px 12px", background: C.accent, color: C.accentFg, border: "none", borderRadius: 18, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}><Ico n="plus" s={11} c={C.accentFg}/>追加</button></div><div style={{ flex: 1, overflowY: "auto", background: C.surface }}>{items.length === 0 ? <div style={{ textAlign: "center", padding: "36px 20px" }}><div style={{ opacity: 0.2, marginBottom: 8 }}><Ico n={icon} s={36} c={C.sub}/></div><div style={{ fontSize: 12, color: C.hint }}>まだ{title}がありません</div></div> : items.map((item, i) => <EntityCard key={item.id} icon={icon} iconColor={item.imageColor || item.color || iconColor} image={renderImage ? renderImage(item) : null} name={renderName(item)} subtitle={renderSubtitle ? renderSubtitle(item) : null} tags={renderTags ? renderTags(item) : null} onClick={() => onEdit(item)} onDelete={() => onDelete(item.id)} onMoveUp={onMoveUp && i > 0 ? () => onMoveUp(i) : onMoveUp !== undefined ? null : undefined} onMoveDown={onMoveDown && i < items.length - 1 ? () => onMoveDown(i) : onMoveDown !== undefined ? null : undefined}/>)}</div></div>);

const CharacterEdit = ({ char: init, data, onSave, onClose, onDelete }) => {
  const [c, setC] = useState(init || { id: uid(), lastName: "", firstName: "", lastNameFuri: "", firstNameFuri: "", nameOrder: "last_first", genderId: "", imageColor: "#8EA3C3", image: "", birthday: "", deathDate: "", notes: "", relatedCharacters: [], relatedGroups: [], relatedTerms: [], parameters: [] });
  const u = (k, v) => setC(p => ({ ...p, [k]: v }));
  const [tab, setTab] = useState("basic");
  return (<Modal title={charName(c) || "新しい人物"} onClose={onClose} footer={<>{init && <Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex: 1 }}/><Btn variant="primary" icon="save" onClick={() => onSave(c)}>保存</Btn></>}><Tabs active={tab} onChange={setTab} tabs={[{ key: "basic", label: "基本情報" }, { key: "links", label: "紐付け" }, { key: "params", label: "パラメータ" }]}/>{tab === "basic" && <><ImageUpload value={c.image} onChange={v => u("image", v)}/><Field label="名前の順序"><div style={{ display: "flex", gap: 6 }}>{[["last_first", "姓 → 名"], ["first_last", "名 → 姓"]].map(([v, l]) => <button key={v} onClick={() => u("nameOrder", v)} style={{ padding: "5px 12px", borderRadius: 18, border: `1.5px solid ${c.nameOrder === v ? C.accent : C.border}`, background: c.nameOrder === v ? C.accent : C.surface, color: c.nameOrder === v ? C.accentFg : C.sub, fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}>{l}</button>)}</div></Field>{c.nameOrder === "last_first" ? <><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="姓" value={c.lastName} onChange={v => u("lastName", v)} placeholder="山田"/><Inp label="名" value={c.firstName} onChange={v => u("firstName", v)} placeholder="太郎"/></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="姓（ふりがな）" value={c.lastNameFuri} onChange={v => u("lastNameFuri", v)} placeholder="やまだ"/><Inp label="名（ふりがな）" value={c.firstNameFuri} onChange={v => u("firstNameFuri", v)} placeholder="たろう"/></div></> : <><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="名" value={c.firstName} onChange={v => u("firstName", v)} placeholder="太郎"/><Inp label="姓" value={c.lastName} onChange={v => u("lastName", v)} placeholder="山田"/></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="名（ふりがな）" value={c.firstNameFuri} onChange={v => u("firstNameFuri", v)} placeholder="たろう"/><Inp label="姓（ふりがな）" value={c.lastNameFuri} onChange={v => u("lastNameFuri", v)} placeholder="やまだ"/></div></>}<Sel label="性別" value={c.genderId} onChange={v => u("genderId", v)} options={data.genders.map(g => ({ value: g.id, label: g.name }))}/><Field label="イメージカラー"><div style={{ display: "flex", gap: 10, alignItems: "center" }}><input type="color" value={c.imageColor} onChange={e => u("imageColor", e.target.value)} style={{ width: 34, height: 34, border: `1px solid ${C.border}`, borderRadius: 7, cursor: "pointer", padding: 2 }}/><span style={{ fontSize: 12, color: C.sub }}>{c.imageColor}</span></div></Field><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="誕生日" value={c.birthday} onChange={v => u("birthday", v)} type="date"/><Inp label="死亡日" value={c.deathDate} onChange={v => u("deathDate", v)} type="date"/></div><Inp label="備考" value={c.notes} onChange={v => u("notes", v)} rows={3} placeholder="メモ・設定など..."/></>}{tab === "links" && <><Field label="関連人物" mb={16}>{c.relatedCharacters.map(rel => { const ch = data.characters.find(x => x.id === rel.charId); return ch ? <CharRelCard key={rel.charId} rel={rel} character={ch} onUpdate={up => u("relatedCharacters", c.relatedCharacters.map(r => r.charId === up.charId ? up : r))} onRemove={() => u("relatedCharacters", c.relatedCharacters.filter(r => r.charId !== rel.charId))}/> : null; })}<AdditiveLinker available={data.characters.filter(ch => ch.id !== c.id && !c.relatedCharacters.some(r => r.charId === ch.id))} onAdd={id => u("relatedCharacters", [...c.relatedCharacters, { charId: id, callName: "", calledName: "" }])} getLabel={charName} getColor={ch => ch.imageColor}/></Field><Divider/><Field label="関連集団" mb={16}>{c.relatedGroups.map(rel => { const g = data.groups.find(x => x.id === rel.groupId); return g ? <GroupRelCard key={rel.groupId} rel={rel} group={g} onUpdate={up => u("relatedGroups", c.relatedGroups.map(r => r.groupId === up.groupId ? up : r))} onRemove={() => u("relatedGroups", c.relatedGroups.filter(r => r.groupId !== rel.groupId))}/> : null; })}<AdditiveLinker available={data.groups.filter(g => !c.relatedGroups.some(r => r.groupId === g.id))} onAdd={id => u("relatedGroups", [...c.relatedGroups, { groupId: id, position: "" }])} getLabel={g => g.name || "（無名）"}/></Field><Divider/><Field label="関連用語" mb={0}><div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>{c.relatedTerms.map(id => { const t = data.terms.find(x => x.id === id); return t ? <Tag key={id} label={t.name} onRemove={() => u("relatedTerms", c.relatedTerms.filter(x => x !== id))}/> : null; })}</div><AdditiveLinker available={data.terms.filter(t => !c.relatedTerms.includes(t.id))} onAdd={id => u("relatedTerms", [...c.relatedTerms, id])} getLabel={t => t.name || "（無名）"}/></Field></>}{tab === "params" && (data.parameters.length === 0 ? <div style={{ textAlign: "center", padding: "24px 0", color: C.hint, fontSize: 13 }}>副要素 → パラメータで項目を追加してください</div> : data.parameters.map(p => { const ex = c.parameters.find(x => x.paramId === p.id); return <Inp key={p.id} label={p.name} value={ex ? ex.value : ""} onChange={v => { const np = c.parameters.filter(x => x.paramId !== p.id); if (v) np.push({ paramId: p.id, value: v }); u("parameters", np); }} placeholder={`${p.name}を入力...`}/>; }))}</Modal>);
};

const SceneEdit = ({ scene: init, data, onSave, onClose, onDelete }) => {
  const [s, setS] = useState(init || { id: uid(), title: "", startDate: "", endDate: "", relatedCharacters: [], relatedLocationId: "", relatedChapterId: "", relatedTerms: [], script: "", notes: "" });
  const u = (k, v) => setS(p => ({ ...p, [k]: v }));
  const [tab, setTab] = useState("basic");
  return (<Modal title={s.title || "新しいシーン"} onClose={onClose} footer={<>{init && <Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex: 1 }}/><Btn variant="primary" icon="save" onClick={() => onSave(s)}>保存</Btn></>}><Tabs active={tab} onChange={setTab} tabs={[{ key: "basic", label: "基本" }, { key: "script", label: "脚本" }, { key: "links", label: "紐付け" }]}/>{tab === "basic" && <><Inp label="シーンタイトル" value={s.title} onChange={v => u("title", v)} placeholder="タイトルを入力..."/><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}><Inp label="開始日時" value={s.startDate} onChange={v => u("startDate", v)} type="date"/><Inp label="終了日時" value={s.endDate} onChange={v => u("endDate", v)} type="date"/></div>{s.startDate && s.relatedCharacters.length > 0 && <div style={{ background: "#F0F4FF", borderRadius: 8, padding: "10px 12px", marginBottom: 14 }}><Lbl>🎂 登場人物の年齢（開始日時点）</Lbl>{s.relatedCharacters.map(cid => { const ch = data.characters.find(c => c.id === cid); if (!ch || !ch.birthday) return null; const age = calcAge(ch.birthday, s.startDate); return age !== null ? <div key={cid} style={{ display: "flex", gap: 6, fontSize: 12, marginBottom: 1 }}><span style={{ color: ch.imageColor, fontWeight: 700 }}>●</span><span>{charName(ch)}</span><span style={{ color: C.sub }}>{age}歳</span></div> : null; })}</div>}<Sel label="関連場所" value={s.relatedLocationId} onChange={v => u("relatedLocationId", v)} options={data.locations.map(l => ({ value: l.id, label: l.name || "（無名）" }))}/><Sel label="関連する章" value={s.relatedChapterId} onChange={v => u("relatedChapterId", v)} options={data.chapters.map(c => ({ value: c.id, label: c.title || "（無題）" }))}/><Inp label="備考" value={s.notes} onChange={v => u("notes", v)} rows={3} placeholder="メモ..."/></>}{tab === "script" && <Inp label="脚本" value={s.script} onChange={v => u("script", v)} rows={12} placeholder="シーンの脚本..."/>}{tab === "links" && <><Field label="関連人物" mb={16}><div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>{s.relatedCharacters.map(id => { const ch = data.characters.find(c => c.id === id); return ch ? <Tag key={id} label={charName(ch)} color={ch.imageColor} onRemove={() => u("relatedCharacters", s.relatedCharacters.filter(x => x !== id))}/> : null; })}</div><AdditiveLinker available={data.characters.filter(ch => !s.relatedCharacters.includes(ch.id))} onAdd={id => u("relatedCharacters", [...s.relatedCharacters, id])} getLabel={charName} getColor={ch => ch.imageColor}/></Field><Divider/><Field label="関連用語" mb={0}><div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>{s.relatedTerms.map(id => { const t = data.terms.find(x => x.id === id); return t ? <Tag key={id} label={t.name} onRemove={() => u("relatedTerms", s.relatedTerms.filter(x => x !== id))}/> : null; })}</div><AdditiveLinker available={data.terms.filter(t => !s.relatedTerms.includes(t.id))} onAdd={id => u("relatedTerms", [...s.relatedTerms, id])} getLabel={t => t.name || "（無名）"}/></Field></>}</Modal>);
};

const ChapterEdit = ({ chapter: init, data, onSave, onClose, onDelete }) => { const [ch, setCh] = useState(init || { id: uid(), title: "", relatedScenes: [], notes: "" }); const u = (k, v) => setCh(p => ({ ...p, [k]: v })); return (<Modal title={ch.title || "新しい章"} onClose={onClose} footer={<>{init && <Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex: 1 }}/><Btn variant="primary" icon="save" onClick={() => onSave(ch)}>保存</Btn></>}><Inp label="章タイトル" value={ch.title} onChange={v => u("title", v)} placeholder="第一章: ..."/><Field label="関連シーン" mb={14}><div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>{ch.relatedScenes.map(id => { const s = data.scenes.find(x => x.id === id); return s ? <Tag key={id} label={s.title || "（無題）"} onRemove={() => u("relatedScenes", ch.relatedScenes.filter(x => x !== id))}/> : null; })}</div><AdditiveLinker available={data.scenes.filter(s => !ch.relatedScenes.includes(s.id))} onAdd={id => u("relatedScenes", [...ch.relatedScenes, id])} getLabel={s => s.title || "（無題）"}/></Field><Inp label="備考" value={ch.notes} onChange={v => u("notes", v)} rows={3} placeholder="メモ..."/></Modal>); };

const SimpleEdit = ({ item: init, entityName, fields, data, onSave, onClose, onDelete }) => { const defs = { id: uid(), name: "" }; fields.forEach(f => { if (!(f.key in defs)) defs[f.key] = f.type === "links" ? [] : ""; }); const [item, setItem] = useState({ ...defs, ...(init || {}) }); const u = (k, v) => setItem(p => ({ ...p, [k]: v })); return (<Modal title={item.name || `新しい${entityName}`} onClose={onClose} footer={<>{init && <Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex: 1 }}/><Btn variant="primary" icon="save" onClick={() => onSave(item)}>保存</Btn></>}>{fields.map(f => { if (f.type === "text") return <Inp key={f.key} label={f.label} value={item[f.key] || ""} onChange={v => u(f.key, v)} placeholder={f.placeholder}/>; if (f.type === "textarea") return <Inp key={f.key} label={f.label} value={item[f.key] || ""} onChange={v => u(f.key, v)} rows={3} placeholder={f.placeholder}/>; if (f.type === "color") return <Field key={f.key} label={f.label}><div style={{ display: "flex", gap: 10, alignItems: "center" }}><input type="color" value={item[f.key] || "#888"} onChange={e => u(f.key, e.target.value)} style={{ width: 34, height: 34, border: `1px solid ${C.border}`, borderRadius: 7, cursor: "pointer", padding: 2 }}/><span style={{ fontSize: 12, color: C.sub }}>{item[f.key]}</span></div></Field>; if (f.type === "links") return <Field key={f.key} label={f.label} mb={14}><div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 8 }}>{(item[f.key] || []).map(id => { const x = (data[f.dataKey] || []).find(d => d.id === id); return x ? <Tag key={id} label={f.getLabel ? f.getLabel(x) : (x.name || "?")} color={f.getColor ? f.getColor(x) : null} onRemove={() => u(f.key, (item[f.key] || []).filter(i => i !== id))}/> : null; })}</div><AdditiveLinker available={(data[f.dataKey] || []).filter(x => !(item[f.key] || []).includes(x.id))} onAdd={id => u(f.key, [...(item[f.key] || []), id])} getLabel={f.getLabel || (x => x.name || "（無名）")} getColor={f.getColor}/></Field>; return null; })}</Modal>); };

const TimelineView = ({ data }) => { const scenes = [...data.scenes].filter(s => s.startDate).sort((a, b) => new Date(a.startDate) - new Date(b.startDate)); return (<div style={{ flex: 1, overflowY: "auto", padding: 16 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 16 }}>タイムライン</div>{scenes.length === 0 ? <div style={{ textAlign: "center", padding: "40px 0", color: C.hint, fontSize: 13 }}>日付が設定されたシーンが表示されます</div> : scenes.map((sc, i) => { const chap = data.chapters.find(c => c.id === sc.relatedChapterId); const chars = sc.relatedCharacters.map(id => data.characters.find(c => c.id === id)).filter(Boolean); return (<div key={sc.id} style={{ display: "flex", gap: 10, marginBottom: 8 }}><div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0, paddingTop: 3 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, flexShrink: 0 }}/>{i < scenes.length - 1 && <div style={{ width: 1, flex: 1, background: C.border, marginTop: 3 }}/>}</div><div style={{ flex: 1, background: C.surface, borderRadius: 9, padding: "10px 12px", border: `1px solid ${C.border}`, marginBottom: 4 }}><div style={{ fontSize: 10, color: C.hint, marginBottom: 2 }}>{sc.startDate}{sc.endDate && sc.endDate !== sc.startDate ? ` → ${sc.endDate}` : ""}</div><div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>{sc.title || "（無題）"}</div><div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{chap && <Tag label={chap.title || "（無題）"}/>}{chars.map(ch => <Tag key={ch.id} label={charName(ch)} color={ch.imageColor}/>)}</div></div></div>); })}</div>); };

// ===== MAIN APP =====
function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [data, setData] = useState(null);
  const [dataId, setDataId] = useState(null);
  const [saveStatus, setSaveStatus] = useState("saved");
  const [activeTab, setActiveTab] = useState("elements");
  const [activeView, setActiveView] = useState(null);
  const [modal, setModal] = useState(null);
  const importRef = useRef();

  // Auth state
  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => { setSession(session); setAuthLoading(false); });
    const { data: { subscription } } = db.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  // Load data from Supabase when logged in
  useEffect(() => {
    if (!session) { setData(null); setDataId(null); return; }
    (async () => {
      const { data: rows } = await db.from("story_data").select("id, data").eq("user_id", session.user.id).limit(1);
      if (rows && rows.length > 0) { setDataId(rows[0].id); setData(norm(rows[0].data)); }
      else setData(norm({}));
    })();
  }, [session]);

  // Auto-save to Supabase
  useEffect(() => {
    if (!data || !session) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      if (dataId) {
        await db.from("story_data").update({ data, updated_at: new Date().toISOString() }).eq("id", dataId);
      } else {
        const { data: row } = await db.from("story_data").insert({ user_id: session.user.id, data }).select().single();
        if (row) setDataId(row.id);
      }
      setSaveStatus("saved");
    }, 1500);
    return () => clearTimeout(t);
  }, [data]);

  const upd = useCallback(fn => setData(p => fn(p)), []);
  const upsert = useCallback((key, item) => upd(p => { const l = [...p[key]]; const i = l.findIndex(x => x.id === item.id); if (i >= 0) l[i] = item; else l.push(item); return { ...p, [key]: l }; }), [upd]);
  const del = useCallback((key, id) => { upd(p => ({ ...p, [key]: p[key].filter(x => x.id !== id) })); setModal(null); }, [upd]);

  const exportData = useCallback(() => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `${data.storyTitle || "story"}_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); }, [data]);
  const handleImport = useCallback((e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); if (window.confirm("現在のデータを上書きして読み込みますか？")) setData(norm(imported)); } catch { alert("ファイルの読み込みに失敗しました"); } }; reader.readAsText(file); e.target.value = ""; }, []);

  const saveChar = useCallback(ch => { upd(p => { const chars = [...p.characters]; const i = chars.findIndex(c => c.id === ch.id); if (i >= 0) chars[i] = ch; else chars.push(ch); const groups = p.groups.map(g => { const linked = ch.relatedGroups.some(r => r.groupId === g.id), has = g.relatedCharacters.includes(ch.id); if (linked && !has) return { ...g, relatedCharacters: [...g.relatedCharacters, ch.id] }; if (!linked && has) return { ...g, relatedCharacters: g.relatedCharacters.filter(id => id !== ch.id) }; return g; }); return { ...p, characters: chars, groups }; }); setModal(null); }, [upd]);
  const saveGroup = useCallback(g => { upd(p => { const groups = [...p.groups]; const i = groups.findIndex(x => x.id === g.id); if (i >= 0) groups[i] = g; else groups.push(g); const characters = p.characters.map(ch => { const inGroup = g.relatedCharacters.includes(ch.id), hasGroup = ch.relatedGroups.some(r => r.groupId === g.id); if (inGroup && !hasGroup) return { ...ch, relatedGroups: [...ch.relatedGroups, { groupId: g.id, position: "" }] }; if (!inGroup && hasGroup) return { ...ch, relatedGroups: ch.relatedGroups.filter(r => r.groupId !== g.id) }; return ch; }); return { ...p, groups, characters }; }); setModal(null); }, [upd]);
  const saveScene = useCallback(sc => { upd(p => { const scenes = [...p.scenes]; const i = scenes.findIndex(s => s.id === sc.id); if (i >= 0) scenes[i] = sc; else scenes.push(sc); const chapters = p.chapters.map(ch => { const linked = sc.relatedChapterId === ch.id, has = ch.relatedScenes.includes(sc.id); if (linked && !has) return { ...ch, relatedScenes: [...ch.relatedScenes, sc.id] }; if (!linked && has) return { ...ch, relatedScenes: ch.relatedScenes.filter(id => id !== sc.id) }; return ch; }); return { ...p, scenes, chapters }; }); setModal(null); }, [upd]);
  const saveChapter = useCallback(ch => { upd(p => { const chapters = [...p.chapters]; const i = chapters.findIndex(c => c.id === ch.id); if (i >= 0) chapters[i] = ch; else chapters.push(ch); const scenes = p.scenes.map(sc => { const inChap = ch.relatedScenes.includes(sc.id); if (inChap && sc.relatedChapterId !== ch.id) return { ...sc, relatedChapterId: ch.id }; if (!inChap && sc.relatedChapterId === ch.id) return { ...sc, relatedChapterId: "" }; return sc; }); return { ...p, chapters, scenes }; }); setModal(null); }, [upd]);
  const moveEntity = useCallback((key, idx, dir) => upd(p => { const items = [...p[key]]; const ni = idx + dir; if (ni < 0 || ni >= items.length) return p; [items[idx], items[ni]] = [items[ni], items[idx]]; return { ...p, [key]: items }; }), [upd]);
  const moveChapter = useCallback((idx, dir) => moveEntity("chapters", idx, dir), [moveEntity]);

  // Loading / Auth screens
  if (authLoading) return <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: C.bg }}><div style={{ fontSize: 13, color: C.hint }}>読み込み中...</div></div>;
  if (!session) return <LoginScreen/>;
  if (!data) return <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: C.bg }}><div style={{ fontSize: 13, color: C.hint }}>データを読み込み中...</div></div>;

  const elements = [{ key: "characters", label: "人物", icon: "person", color: "#E8916E" }, { key: "groups", label: "集団", icon: "group", color: "#D9618A" }, { key: "locations", label: "場所", icon: "pin", color: "#4CAF82" }, { key: "scenes", label: "シーン", icon: "scene", color: "#5B9BD5" }, { key: "chapters", label: "章", icon: "book", color: "#9B7DD4" }, { key: "terms", label: "用語", icon: "term", color: "#C0392B" }];
  const subElements = [{ key: "genders", label: "性別", icon: "gender", color: "#D9618A" }, { key: "parameters", label: "パラメータ", icon: "param", color: "#7B8DA6" }];
  const GridView = ({ items }) => (<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: C.border }}>{items.map(it => <button key={it.key} onClick={() => setActiveView({ type: it.key })} style={{ background: C.surface, border: "none", cursor: "pointer", padding: "22px 8px", display: "flex", flexDirection: "column", alignItems: "center", gap: 7, fontFamily: "inherit" }}><div style={{ width: 50, height: 50, borderRadius: 12, background: it.color + "18", display: "flex", alignItems: "center", justifyContent: "center" }}><Ico n={it.icon} s={23} c={it.color} sw={1.3}/></div><div style={{ fontSize: 12, fontWeight: 500, color: C.text }}>{it.label}</div><div style={{ fontSize: 10, color: C.hint, background: C.tag, padding: "1px 6px", borderRadius: 8 }}>{data[it.key] ? data[it.key].length : 0}</div></button>)}</div>);

  const renderView = () => {
    if (!activeView) {
      if (activeTab === "elements") return <div style={{ flex: 1, overflowY: "auto" }}><GridView items={elements}/></div>;
      if (activeTab === "subElements") return <div style={{ flex: 1, overflowY: "auto" }}><GridView items={subElements}/></div>;
      if (activeTab === "edit") return (<div style={{ flex: 1, overflowY: "auto" }}>{[{ key: "storySettings", label: "ストーリー設定", icon: "settings", desc: "タイトル・あらすじ・バックアップ" }, { key: "chapters", label: "章と脚本", icon: "book", desc: "章の一覧・順序管理" }, { key: "scenes", label: "シーンデザイナ", icon: "scene", desc: "シーンの詳細設計" }].map(it => (<button key={it.key} onClick={() => setActiveView({ type: it.key })} style={{ width: "100%", padding: "15px 16px", display: "flex", alignItems: "center", gap: 12, background: C.surface, border: "none", borderBottom: `1px solid ${C.borderL}`, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}><Ico n={it.icon} s={18} c={C.hint}/><div><div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{it.label}</div><div style={{ fontSize: 11, color: C.sub }}>{it.desc}</div></div><div style={{ marginLeft: "auto" }}><Ico n="chevR" s={14} c={C.hint}/></div></button>))}</div>);
      if (activeTab === "view") return <TimelineView data={data}/>;
      return null;
    }
    switch (activeView.type) {
      case "storySettings": return (<div style={{ flex: 1, overflowY: "auto", padding: 16 }}><Inp label="ストーリータイトル" value={data.storyTitle} onChange={v => upd(p => ({ ...p, storyTitle: v }))} placeholder="タイトルを入力..."/><Inp label="あらすじ" value={data.storySynopsis} onChange={v => upd(p => ({ ...p, storySynopsis: v }))} rows={5} placeholder="ストーリーの概要..."/><Divider/><Field label="バックアップ"><div style={{ display: "flex", flexDirection: "column", gap: 8 }}><Btn icon="download" onClick={exportData}>JSONでバックアップ</Btn><div><Btn icon="upload" onClick={() => importRef.current.click()}>JSONを復元</Btn><input ref={importRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleImport}/></div><div style={{ fontSize: 11, color: C.hint, lineHeight: 1.6 }}>データはSupabaseに自動保存されます。JSONバックアップは念のための保険です。</div></div></Field></div>);
      case "characters": return <EntityList title="人物" icon="person" iconColor="#E8916E" items={data.characters} onAdd={() => setModal({ type: "character" })} onEdit={it => setModal({ type: "character", item: it })} onDelete={id => del("characters", id)} renderName={charName} renderImage={c => c.image || null} renderSubtitle={c => { const g = data.genders.find(x => x.id === c.genderId); return [g ? g.name : null, c.birthday ? `${c.birthday}生` : null].filter(Boolean).join(" · ") || null; }} renderTags={c => c.relatedGroups.slice(0,2).map(r => { const g = data.groups.find(x => x.id === r.groupId); return g ? { label: r.position ? `${g.name}（${r.position}）` : g.name } : null; }).filter(Boolean)} onMoveUp={i => moveEntity("characters", i, -1)} onMoveDown={i => moveEntity("characters", i, 1)}/>;
      case "groups": return <EntityList title="集団" icon="group" iconColor="#D9618A" items={data.groups} onAdd={() => setModal({ type: "group" })} onEdit={it => setModal({ type: "group", item: it })} onDelete={id => del("groups", id)} renderName={g => g.name || "（無名）"} renderSubtitle={g => `${g.relatedCharacters.length}名が所属`} onMoveUp={i => moveEntity("groups", i, -1)} onMoveDown={i => moveEntity("groups", i, 1)}/>;
      case "locations": return <EntityList title="場所" icon="pin" iconColor="#4CAF82" items={data.locations} onAdd={() => setModal({ type: "location" })} onEdit={it => setModal({ type: "location", item: it })} onDelete={id => del("locations", id)} renderName={l => l.name || "（無名）"} renderSubtitle={l => l.description ? l.description.slice(0, 36) : null} onMoveUp={i => moveEntity("locations", i, -1)} onMoveDown={i => moveEntity("locations", i, 1)}/>;
      case "scenes": return <EntityList title="シーン" icon="scene" iconColor="#5B9BD5" items={data.scenes} onAdd={() => setModal({ type: "scene" })} onEdit={it => setModal({ type: "scene", item: it })} onDelete={id => del("scenes", id)} renderName={s => s.title || "（無題）"} renderSubtitle={s => { const ch = data.chapters.find(c => c.id === s.relatedChapterId); return [s.startDate, ch ? ch.title : null].filter(Boolean).join(" · ") || null; }} onMoveUp={i => moveEntity("scenes", i, -1)} onMoveDown={i => moveEntity("scenes", i, 1)}/>;
      case "chapters": return <EntityList title="章" icon="book" iconColor="#9B7DD4" items={data.chapters} onAdd={() => setModal({ type: "chapter" })} onEdit={it => setModal({ type: "chapter", item: it })} onDelete={id => del("chapters", id)} renderName={c => c.title || "（無題）"} renderSubtitle={c => `${c.relatedScenes.length}シーン`} onMoveUp={moveChapter} onMoveDown={moveChapter}/>;
      case "terms": return <EntityList title="用語" icon="term" iconColor="#C0392B" items={data.terms} onAdd={() => setModal({ type: "term" })} onEdit={it => setModal({ type: "term", item: it })} onDelete={id => del("terms", id)} renderName={t => t.name || "（無名）"} renderSubtitle={t => t.description ? t.description.slice(0, 36) : null} onMoveUp={i => moveEntity("terms", i, -1)} onMoveDown={i => moveEntity("terms", i, 1)}/>;
      case "genders": return <EntityList title="性別" icon="gender" iconColor="#D9618A" items={data.genders} onAdd={() => setModal({ type: "gender" })} onEdit={it => setModal({ type: "gender", item: it })} onDelete={id => del("genders", id)} renderName={g => g.name || "（無名）"} renderSubtitle={g => g.color} onMoveUp={i => moveEntity("genders", i, -1)} onMoveDown={i => moveEntity("genders", i, 1)}/>;
      case "parameters": return <EntityList title="パラメータ" icon="param" iconColor="#7B8DA6" items={data.parameters} onAdd={() => setModal({ type: "parameter" })} onEdit={it => setModal({ type: "parameter", item: it })} onDelete={id => del("parameters", id)} renderName={p => p.name || "（無名）"} renderSubtitle={p => p.description ? p.description.slice(0, 36) : null} onMoveUp={i => moveEntity("parameters", i, -1)} onMoveDown={i => moveEntity("parameters", i, 1)}/>;
      default: return null;
    }
  };

  const renderModal = () => {
    if (!modal) return null;
    const { type, item } = modal;
    const km = { character: "characters", scene: "scenes", chapter: "chapters", group: "groups", location: "locations", term: "terms", gender: "genders", parameter: "parameters" };
    const D = item ? () => del(km[type], item.id) : null;
    if (type === "character") return <CharacterEdit char={item} data={data} onSave={saveChar} onClose={() => setModal(null)} onDelete={D}/>;
    if (type === "scene") return <SceneEdit scene={item} data={data} onSave={saveScene} onClose={() => setModal(null)} onDelete={D}/>;
    if (type === "chapter") return <ChapterEdit chapter={item} data={data} onSave={saveChapter} onClose={() => setModal(null)} onDelete={D}/>;
    if (type === "group") return <SimpleEdit item={item} entityName="集団" data={data} onSave={g => saveGroup({ relatedCharacters: [], ...g })} onClose={() => setModal(null)} onDelete={D} fields={[{ key: "name", label: "集団名", type: "text", placeholder: "例：冒険者ギルド" }, { key: "description", label: "説明", type: "textarea", placeholder: "集団の説明..." }, { key: "relatedCharacters", label: "所属人物", type: "links", dataKey: "characters", getLabel: charName, getColor: c => c.imageColor }, { key: "notes", label: "備考", type: "textarea", placeholder: "メモ..." }]}/>;
    if (type === "location") return <SimpleEdit item={item} entityName="場所" data={data} onSave={l => { upsert("locations", l); setModal(null); }} onClose={() => setModal(null)} onDelete={D} fields={[{ key: "name", label: "場所名", type: "text", placeholder: "例：王都カルナ" }, { key: "description", label: "説明", type: "textarea", placeholder: "説明..." }, { key: "notes", label: "備考", type: "textarea", placeholder: "メモ..." }]}/>;
    if (type === "term") return <SimpleEdit item={item} entityName="用語" data={data} onSave={t => { upsert("terms", t); setModal(null); }} onClose={() => setModal(null)} onDelete={D} fields={[{ key: "name", label: "用語名", type: "text", placeholder: "例：魔導石" }, { key: "description", label: "説明", type: "textarea", placeholder: "説明..." }, { key: "relatedCharacters", label: "関連人物", type: "links", dataKey: "characters", getLabel: charName, getColor: c => c.imageColor }, { key: "notes", label: "備考", type: "textarea", placeholder: "メモ..." }]}/>;
    if (type === "gender") return <SimpleEdit item={item} entityName="性別" data={data} onSave={g => { upsert("genders", g); setModal(null); }} onClose={() => setModal(null)} onDelete={D} fields={[{ key: "name", label: "性別名", type: "text", placeholder: "例：男性 / 女性..." }, { key: "color", label: "カラー", type: "color" }]}/>;
    if (type === "parameter") return <SimpleEdit item={item} entityName="パラメータ" data={data} onSave={p => { upsert("parameters", p); setModal(null); }} onClose={() => setModal(null)} onDelete={D} fields={[{ key: "name", label: "パラメータ名", type: "text", placeholder: "例：好きな食べ物..." }, { key: "description", label: "説明（任意）", type: "textarea", placeholder: "説明..." }]}/>;
    return null;
  };

  const navTabs = [{ key: "elements", label: "要素", icon: "person" }, { key: "subElements", label: "副要素", icon: "param" }, { key: "edit", label: "編集", icon: "edit" }, { key: "view", label: "ビュー", icon: "timeline" }];

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: C.bg, maxWidth: 480, margin: "0 auto" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 16px", background: C.surface, borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
        {activeView ? <button onClick={() => setActiveView(null)} style={{ background: "none", border: "none", cursor: "pointer", padding: "3px 6px", display: "flex", alignItems: "center", gap: 3 }}><Ico n="back" s={15} c={C.accent}/><span style={{ fontSize: 12, color: C.accent }}>戻る</span></button> : <button onClick={() => db.auth.signOut()} style={{ background: "none", border: "none", cursor: "pointer", padding: "3px 6px", display: "flex", alignItems: "center", gap: 3, opacity: 0.4 }}><Ico n="logout" s={15} c={C.text}/></button>}
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, letterSpacing: -0.3, maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{data.storyTitle || "ストーリー"}</div>
        <div style={{ width: 52, display: "flex", justifyContent: "flex-end" }}>
          <span style={{ fontSize: 10, color: C.hint, opacity: saveStatus === "saving" ? 1 : 0.6 }}>{saveStatus === "saving" ? "保存中..." : "✓ 保存済み"}</span>
        </div>
      </div>
      <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>{renderView()}</div>
      <div style={{ display: "flex", borderTop: `1px solid ${C.border}`, background: C.surface, flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        {navTabs.map(t => { const active = activeTab === t.key && !activeView; return <button key={t.key} onClick={() => { setActiveTab(t.key); setActiveView(null); }} style={{ flex: 1, padding: "9px 4px 7px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}><Ico n={t.icon} s={21} c={active ? C.accent : C.hint} sw={active ? 2 : 1.5}/><span style={{ fontSize: 10, fontWeight: active ? 600 : 400, color: active ? C.accent : C.hint }}>{t.label}</span></button>; })}
      </div>
      {renderModal()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
