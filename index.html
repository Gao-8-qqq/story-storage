const uid = () => `${Date.now()}_${Math.random().toString(36).slice(2,9)}`;
const charName = (ch) => { if (!ch) return "（不明）"; const n = ch.nameOrder==="last_first"?`${ch.lastName} ${ch.firstName}`:`${ch.firstName} ${ch.lastName}`; return n.trim()||"（無名）"; };
const calcAge = (birth,target) => { if(!birth||!target) return null; const b=new Date(birth),t=new Date(target); let age=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0||(m===0&&t.getDate()<b.getDate())) age--; return age>=0?age:null; };
const compressImage = (dataUrl) => new Promise(resolve => { const img=new Image(); img.onload=()=>{ const max=800; let w=img.width,h=img.height; if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}} const c=document.createElement("canvas"); c.width=w;c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); resolve(c.toDataURL("image/jpeg",0.82)); }; img.src=dataUrl; });
const countChars = (str) => { if(!str) return 0; return str.replace(/\s/g,"").length; };
const storyChars = (d) => (d.scenes||[]).reduce((sum,s)=>sum+countChars(s.script),0);
const mkSummary = (d) => ({ synopsis:(d.storySynopsis||"").slice(0,80), chars:(d.characters||[]).length, scenes:(d.scenes||[]).length, words:storyChars(d) });

const norm = (d) => {

    abilities:c.abilities||[],

};
let C = { ...THEMES.mono.light };
const applyTheme = (themeKey, dark) => {
  const t = THEMES[themeKey] || THEMES.mono;
  const pal = (dark && t.dark) ? t.dark : t.light;

// ===================== BASE UI =====================
const Tag = ({ label, color, onRemove }) => (<span style={{ display:"inline-flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:20,fontSize:11,background:color?color+"22":C.tag,color:color||C.tagTxt,border:`1px solid ${color||C.border}`,fontWeight:500 }}>{label}{onRemove&&<button onClick={onRemove} style={{ border:"none",background:"transparent",padding:0,cursor:"pointer",display:"flex",opacity:0.5,lineHeight:0 }}><Ico n="x" s={9} c="currentColor"/></button>}</span>);
const Lbl = ({ children }) => <div style={{ fontSize:11,color:C.sub,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px" }}>{children}</div>;
const Field = ({ label, children, mb=14 }) => <div style={{ marginBottom:mb }}>{label&&<Lbl>{label}</Lbl>}{children}</div>;
const IS = () => ({ width:"100%",padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:10,color:C.text,background:C.surface,boxSizing:"border-box",fontFamily:"inherit" });
const Inp = ({ label, value, onChange, type="text", placeholder, rows }) => <Field label={label}>{rows?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...IS(),resize:"vertical" }}/>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={IS()}/>}</Field>;
const Sel = ({ label, value, onChange, options }) => <Field label={label}><select value={value} onChange={e=>onChange(e.target.value)} style={{ ...IS(),cursor:"pointer" }}><option value="">-- 未選択 --</option>{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></Field>;
const Btn = ({ children, onClick, variant="default", small, icon, full }) => { const vs={default:{bg:C.surface,cl:C.text,br:`1px solid ${C.border}`},primary:{bg:C.accent,cl:C.accentFg,br:"none"},danger:{bg:C.danger,cl:"#fff",br:"none"},ghost:{bg:"transparent",cl:C.sub,br:"none"}}; const v=vs[variant]||vs.default; return <button onClick={onClick} style={{ display:"inline-flex",alignItems:"center",gap:5,padding:small?"7px 12px":"11px 16px",borderRadius:10,border:v.br,background:v.bg,color:v.cl,fontSize:small?12:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit",width:full?"100%":"auto",justifyContent:full?"center":"flex-start",minHeight:small?0:44 }}>{icon&&<Ico n={icon} s={small?13:15} c={v.cl}/>}{children}</button>; };
const Divider = () => <div style={{ height:1,background:C.border,margin:"14px 0" }}/>;

const ImageUpload = ({ value, onChange }) => { const ref=useRef(); return (<Field label="キャラクター画像"><div style={{ display:"flex",gap:12,alignItems:"center" }}><div onClick={()=>ref.current.click()} style={{ width:72,height:72,borderRadius:14,border:`2px dashed ${value?"transparent":C.border}`,overflow:"hidden",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",background:value?"transparent":C.bg,flexShrink:0 }}>{value?<img src={value} style={{ width:"100%",height:"100%",objectFit:"cover" }}/>:<Ico n="camera" s={22} c={C.hint}/>}</div><div style={{ display:"flex",flexDirection:"column",gap:6 }}><Btn small onClick={()=>ref.current.click()} icon="camera">{value?"変更":"画像を選択"}</Btn>{value&&<Btn small variant="ghost" onClick={()=>onChange("")}>削除</Btn>}</div><input ref={ref} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ev=>onChange(await compressImage(ev.target.result)); r.readAsDataURL(f); e.target.value=""; }}/></div></Field>); };

const AdditiveLinker = ({ available, onAdd, getLabel, getColor, placeholder="追加して紐付け" }) => {
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const filtered=available.filter(x=>getLabel(x).includes(q));
  const close=()=>{ setOpen(false); setQ(""); };
  return (<><button onClick={()=>setOpen(true)} style={{ display:"flex",alignItems:"center",gap:6,width:"100%",padding:"11px 12px",border:`1.5px dashed ${C.border}`,borderRadius:10,background:"transparent",color:C.hint,cursor:"pointer",fontFamily:"inherit",fontSize:13,minHeight:44 }}><Ico n="plus" s={14} c={C.hint}/>{placeholder}</button>{open&&(<div style={{ position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center" }} onClick={e=>{ if(e.target===e.currentTarget) close(); }}><div style={{ background:C.surface,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:500,maxHeight:"65vh",display:"flex",flexDirection:"column" }}><div style={{ display:"flex",alignItems:"center",gap:8,padding:"12px 14px 10px",borderBottom:`1px solid ${C.border}`,flexShrink:0 }}><input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="検索..." style={{ flex:1,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",color:C.text,fontFamily:"inherit",outline:"none",background:C.bg }}/><button onClick={close} style={{ border:"none",background:"transparent",cursor:"pointer",padding:4,display:"flex" }}><Ico n="x" s={18} c={C.sub}/></button></div><div style={{ overflowY:"auto",flex:1 }}>{filtered.length===0?<div style={{ textAlign:"center",padding:"28px 0",color:C.hint,fontSize:13 }}>{available.length===0?"追加できるデータがありません":"見つかりません"}</div>:filtered.map(x=>(<div key={x.id} onClick={()=>{ onAdd(x.id); close(); }} style={{ display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:`1px solid ${C.borderL}`,cursor:"pointer" }}>{getColor&&getColor(x)&&<div style={{ width:8,height:8,borderRadius:"50%",background:getColor(x),flexShrink:0 }}/>}<span style={{ fontSize:14,color:C.text,flex:1 }}>{getLabel(x)}</span><Ico n="plus" s={15} c={C.hint}/></div>))}</div></div></div>)}</>);

const RadarChart = ({ params, values, color="#5B9BD5", size=200 }) => {
  if (!params||params.length<3) return (<div style={{ textAlign:"center",padding:"20px 0",color:C.hint,fontSize:12,lineHeight:1.6 }}>能力項目を3つ以上追加すると<br/>チャートが表示されます</div>);
  const cx=size/2,cy=size/2,r=size*0.36;
  const ang=(i)=>(2*Math.PI*i/params.length)-Math.PI/2;
  const getV=(pid)=>(values.find(x=>x.paramId===pid)?.value||0)/100;
  const axisEnd=params.map((_,i)=>({x:cx+r*Math.cos(ang(i)),y:cy+r*Math.sin(ang(i))}));
  const valuePts=params.map((p,i)=>{ const v=getV(p.id); return {x:cx+r*v*Math.cos(ang(i)),y:cy+r*v*Math.sin(ang(i))}; });
  const polyStr=valuePts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const grids=[0.25,0.5,0.75,1.0].map(lv=>params.map((_,i)=>`${(cx+r*lv*Math.cos(ang(i))).toFixed(1)},${(cy+r*lv*Math.sin(ang(i))).toFixed(1)}`).join(" "));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:"block",margin:"0 auto" }}>
      {grids.map((g,i)=><polygon key={i} points={g} fill={i===3?C.bg:"none"} stroke={C.border} strokeWidth="0.8"/>)}
      {axisEnd.map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={C.border} strokeWidth="0.8"/>)}
      <polygon points={polyStr} fill={(color||"#5B9BD5")+"44"} stroke={color||"#5B9BD5"} strokeWidth="2"/>
      {valuePts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color||"#5B9BD5"}/>)}
      {params.map((p,i)=>{ const ep=axisEnd[i]; const dx=ep.x-cx,dy=ep.y-cy; const len=Math.sqrt(dx*dx+dy*dy)||1; const lx=ep.x+(dx/len)*18; const ly=ep.y+(dy/len)*16; return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill={C.sub}>{p.name}</text>; })}
    </svg>
  );
};

const LoginScreen = () => {
  const [email,setEmail]=useState(""); const [password,setPassword]=useState(""); const [mode,setMode]=useState("login"); const [loading,setLoading]=useState(false); const [msg,setMsg]=useState(""); const [isErr,setIsErr]=useState(false);
  const handle = async () => { if(!email||!password){setMsg("メールアドレスとパスワードを入力してください");setIsErr(true);return;} setLoading(true);setMsg("");
    if(mode==="login"){ const {error}=await db.auth.signInWithPassword({email,password}); if(error){setMsg("ログインに失敗しました。メールアドレスとパスワードを確認してください。");setIsErr(true);} }
    else { const {error}=await db.auth.signUp({email,password}); if(error){setMsg(error.message);setIsErr(true);} else{setMsg("アカウントを作成しました！そのままログインできます。");setIsErr(false);} }
    setLoading(false); };
  return (<div style={{ height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,padding:24 }}><div style={{ width:"100%",maxWidth:360,background:C.surface,borderRadius:18,padding:28,border:`1px solid ${C.border}` }}><div style={{ fontSize:18,fontWeight:700,color:C.text,marginBottom:4 }}>創作管理アプリ</div><div style={{ fontSize:13,color:C.sub,marginBottom:24 }}>{mode==="login"?"ログイン":"新規登録"}</div><Inp label="メールアドレス" value={email} onChange={setEmail} type="email" placeholder="example@email.com"/><Inp label="パスワード" value={password} onChange={setPassword} type="password" placeholder="6文字以上"/>{msg&&<div style={{ fontSize:12,color:isErr?C.danger:"#10B981",marginBottom:12,lineHeight:1.5 }}>{msg}</div>}<Btn variant="primary" full onClick={handle}>{loading?"処理中...":mode==="login"?"ログイン":"登録する"}</Btn><button onClick={()=>{setMode(mode==="login"?"signup":"login");setMsg("");}} style={{ marginTop:14,width:"100%",background:"none",border:"none",color:C.hint,fontSize:12,cursor:"pointer",textAlign:"center",fontFamily:"inherit" }}>{mode==="login"?"アカウントをお持ちでない方 → 新規登録":"すでにアカウントをお持ちの方 → ログイン"}</button></div></div>);
};

      <Divider/><Field label="関連用語" mb={0}><div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:8 }}>{s.relatedTerms.map(id=>{const t=data.terms.find(x=>x.id===id);return t?<Tag key={id} label={t.name} onRemove={()=>u("relatedTerms",s.relatedTerms.filter(x=>x!==id))}/>:null;})}</div><AdditiveLinker available={data.terms.filter(t=>!s.relatedTerms.includes(t.id))} onAdd={id=>u("relatedTerms",[...s.relatedTerms,id])} getLabel={t=>t.name||"（無名）"}/></Field></>}
  </Modal>);
};

const ChapterEdit = ({ chapter: init, data, onSave, onClose, onDelete }) => { const [ch,setCh]=useState(init||{id:uid(),title:"",relatedScenes:[],notes:""}); const u=(k,v)=>setCh(p=>({...p,[k]:v})); return (<Modal title={ch.title||"新しい章"} onClose={onClose} footer={<>{init&&<Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex:1 }}/><Btn variant="primary" icon="save" onClick={()=>onSave(ch)}>保存</Btn></>}><Inp label="章タイトル" value={ch.title} onChange={v=>u("title",v)} placeholder="第一章: ..."/><Field label="関連シーン" mb={14}><div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:8 }}>{ch.relatedScenes.map(id=>{const s=data.scenes.find(x=>x.id===id);return s?<Tag key={id} label={s.title||"（無題）"} onRemove={()=>u("relatedScenes",ch.relatedScenes.filter(x=>x!==id))}/>:null;})}</div><AdditiveLinker available={data.scenes.filter(s=>!ch.relatedScenes.includes(s.id))} onAdd={id=>u("relatedScenes",[...ch.relatedScenes,id])} getLabel={s=>s.title||"（無題）"}/></Field><Inp label="備考" value={ch.notes} onChange={v=>u("notes",v)} rows={3} placeholder="メモ..."/></Modal>); };

const SimpleEdit = ({ item: init, entityName, fields, data, onSave, onClose, onDelete }) => { const defs={id:uid(),name:""}; fields.forEach(f=>{if(!(f.key in defs)) defs[f.key]=f.type==="links"?[]:""; }); const [item,setItem]=useState({...defs,...(init||{})}); const u=(k,v)=>setItem(p=>({...p,[k]:v})); return (<Modal title={item.name||`新しい${entityName}`} onClose={onClose} footer={<>{init&&<Btn variant="danger" icon="trash" small onClick={onDelete}>削除</Btn>}<div style={{ flex:1 }}/><Btn variant="primary" icon="save" onClick={()=>onSave(item)}>保存</Btn></>}>{fields.map(f=>{ if(f.type==="text") return <Inp key={f.key} label={f.label} value={item[f.key]||""} onChange={v=>u(f.key,v)} placeholder={f.placeholder}/>; if(f.type==="textarea") return <Inp key={f.key} label={f.label} value={item[f.key]||""} onChange={v=>u(f.key,v)} rows={3} placeholder={f.placeholder}/>; if(f.type==="color") return <Field key={f.key} label={f.label}><div style={{ display:"flex",gap:10,alignItems:"center" }}><input type="color" value={item[f.key]||"#888"} onChange={e=>u(f.key,e.target.value)} style={{ width:36,height:36,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer",padding:2 }}/><span style={{ fontSize:12,color:C.sub }}>{item[f.key]}</span></div></Field>; if(f.type==="links") return <Field key={f.key} label={f.label} mb={14}><div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:8 }}>{(item[f.key]||[]).map(id=>{const x=(data[f.dataKey]||[]).find(d=>d.id===id);return x?<Tag key={id} label={f.getLabel?f.getLabel(x):(x.name||"?")} color={f.getColor?f.getColor(x):null} onRemove={()=>u(f.key,(item[f.key]||[]).filter(i=>i!==id))}/>:null;})}</div><AdditiveLinker available={(data[f.dataKey]||[]).filter(x=>!(item[f.key]||[]).includes(x.id))} onAdd={id=>u(f.key,[...(item[f.key]||[]),id])} getLabel={f.getLabel||(x=>x.name||"（無名）")} getColor={f.getColor}/></Field>; return null; })}</Modal>); };

const TimelineView = ({ data }) => { const scenes=[...data.scenes].filter(s=>s.startDate).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)); return (<div style={{ flex:1,overflowY:"auto",padding:16 }}><div style={{ fontSize:14,fontWeight:600,color:C.text,marginBottom:16 }}>タイムライン</div>{scenes.length===0?<div style={{ textAlign:"center",padding:"40px 0",color:C.hint,fontSize:13 }}>日付が設定されたシーンが表示されます</div>:scenes.map((sc,i)=>{ const chap=data.chapters.find(c=>c.id===sc.relatedChapterId); const chars=sc.relatedCharacters.map(id=>data.characters.find(c=>c.id===id)).filter(Boolean); return (<div key={sc.id} style={{ display:"flex",gap:10,marginBottom:8 }}><div style={{ display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,paddingTop:3 }}><div style={{ width:8,height:8,borderRadius:"50%",background:C.accent,flexShrink:0 }}/>{i<scenes.length-1&&<div style={{ width:1,flex:1,background:C.border,marginTop:3 }}/>}</div><div style={{ flex:1,background:C.surface,borderRadius:11,padding:"11px 12px",border:`1px solid ${C.border}`,marginBottom:4 }}><div style={{ fontSize:10,color:C.hint,marginBottom:2 }}>{sc.startDate}{sc.endDate&&sc.endDate!==sc.startDate?` → ${sc.endDate}`:""}</div><div style={{ fontSize:13,fontWeight:600,color:C.text,marginBottom:5 }}>{sc.title||"（無題）"}</div><div style={{ display:"flex",flexWrap:"wrap",gap:3 }}>{chap&&<Tag label={chap.title||"（無題）"}/>}{chars.map(ch=><Tag key={ch.id} label={charName(ch)} color={ch.imageColor}/>)}</div></div></div>); })}</div>); };

// ===================== STORY EDITOR (was App body) =====================
function StoryEditor({ data, setData, onBack, saveStatus }) {
  const [activeTab,setActiveTab]=useState("elements"); const [activeView,setActiveView]=useState(null); const [modal,setModal]=useState(null);
  const importRef=useRef();
  const upd=useCallback(fn=>setData(p=>fn(p)),[setData]);
  const upsert=useCallback((key,item)=>upd(p=>{const l=[...p[key]];const i=l.findIndex(x=>x.id===item.id);if(i>=0)l[i]=item;else l.push(item);return{...p,[key]:l};}),[upd]);
  const del=useCallback((key,id)=>{upd(p=>({...p,[key]:p[key].filter(x=>x.id!==id)}));setModal(null);},[upd]);
  const moveEntity=useCallback((key,idx,dir)=>upd(p=>{const items=[...p[key]];const ni=idx+dir;if(ni<0||ni>=items.length) return p;[items[idx],items[ni]]=[items[ni],items[idx]];return{...p,[key]:items};}),[upd]);

  const exportData=useCallback(()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${data.storyTitle||"story"}_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);},[data]);
  const exportMarkdown=useCallback(()=>{
    let md=`# ${data.storyTitle||"ストーリー"}\n\n`;
    if(data.storySynopsis) md+=`## あらすじ\n\n${data.storySynopsis}\n\n`;
    if(data.characters.length){ md+=`---\n\n## 登場人物\n\n`; data.characters.forEach(c=>{ md+=`### ${charName(c)}\n\n`; const lines=[]; const g=data.genders.find(x=>x.id===c.genderId); if(g) lines.push(`**性別:** ${g.name}`); if(c.birthday) lines.push(`**誕生日:** ${c.birthday}`); if(c.deathDate) lines.push(`**死亡日:** ${c.deathDate}`); const grps=c.relatedGroups.map(r=>{const grp=data.groups.find(x=>x.id===r.groupId);return grp?(r.position?`${grp.name}（${r.position}）`:grp.name):null;}).filter(Boolean); if(grps.length) lines.push(`**所属:** ${grps.join("、")}`); const rels=c.relatedCharacters.map(r=>{const ch=data.characters.find(x=>x.id===r.charId);if(!ch) return null;let s=charName(ch);const sub=[r.callName&&`${r.callName}と呼ぶ`,r.calledName&&`${r.calledName}と呼ばれる`].filter(Boolean);if(sub.length) s+=`（${sub.join("・")}）`;return s;}).filter(Boolean); if(rels.length) lines.push(`**関連人物:** ${rels.join("、")}`); data.parameters.forEach(p=>{const pv=c.parameters.find(x=>x.paramId===p.id);if(pv&&pv.value) lines.push(`**${p.name}:** ${pv.value}`);}); const ab=c.abilities.map(a=>{const ap=data.abilityParams.find(x=>x.id===a.paramId);return ap?`${ap.name}: ${a.value}`:null;}).filter(Boolean); if(ab.length) lines.push(`**能力値:** ${ab.join(" / ")}`); if(lines.length) md+=lines.join("  \n")+"\n\n"; if(c.notes) md+=`${c.notes}\n\n`; }); }
    if(data.groups.length){ md+=`---\n\n## 集団\n\n`; data.groups.forEach(g=>{ md+=`### ${g.name||"（無名）"}\n\n`; if(g.description) md+=`${g.description}\n\n`; const m=g.relatedCharacters.map(id=>{const ch=data.characters.find(c=>c.id===id);return ch?charName(ch):null;}).filter(Boolean); if(m.length) md+=`**メンバー:** ${m.join("、")}\n\n`; if(g.notes) md+=`${g.notes}\n\n`; }); }
    if(data.locations.length){ md+=`---\n\n## 場所\n\n`; data.locations.forEach(l=>{ md+=`### ${l.name||"（無名）"}\n\n`; if(l.description) md+=`${l.description}\n\n`; if(l.notes) md+=`${l.notes}\n\n`; }); }
    if(data.terms.length){ md+=`---\n\n## 用語集\n\n`; data.terms.forEach(t=>{ md+=`### ${t.name||"（無名）"}\n\n`; if(t.description) md+=`${t.description}\n\n`; }); }
    if(data.chapters.length){ md+=`---\n\n## 章構成\n\n`; data.chapters.forEach((ch,idx)=>{ md+=`### ${ch.title||`第${idx+1}章`}\n\n`; const sc=ch.relatedScenes.map(id=>data.scenes.find(s=>s.id===id)).filter(Boolean); if(sc.length) md+=`**シーン:** ${sc.map(s=>s.title||"（無題）").join("、")}\n\n`; if(ch.notes) md+=`${ch.notes}\n\n`; }); }
    if(data.scenes.length){ md+=`---\n\n## シーン\n\n`; data.scenes.forEach(s=>{ md+=`### ${s.title||"（無題）"}\n\n`; const info=[]; if(s.startDate){let d=s.startDate;if(s.endDate&&s.endDate!==s.startDate)d+=` → ${s.endDate}`;info.push(`**日時:** ${d}`);} const chap=data.chapters.find(c=>c.id===s.relatedChapterId);if(chap) info.push(`**章:** ${chap.title||"（無題）"}`); const loc=data.locations.find(l=>l.id===s.relatedLocationId);if(loc) info.push(`**場所:** ${loc.name}`); const chars=s.relatedCharacters.map(id=>{const ch=data.characters.find(c=>c.id===id);return ch?charName(ch):null;}).filter(Boolean); if(chars.length) info.push(`**登場人物:** ${chars.join("、")}`); if(info.length) md+=info.join("  \n")+"\n\n"; if(s.notes) md+=`${s.notes}\n\n`; if(s.script) md+=`\`\`\`\n${s.script}\n\`\`\`\n\n`; }); }
    const blob=new Blob([md],{type:"text/markdown;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${data.storyTitle||"story"}.md`;a.click();URL.revokeObjectURL(url);
  },[data]);
  const handleImport=useCallback((e)=>{const file=e.target.files[0];if(!file) return;const reader=new FileReader();reader.onload=(ev)=>{try{const imported=JSON.parse(ev.target.result);if(window.confirm("この作品のデータを上書きして読み込みますか？")) setData(norm(imported));}catch{alert("ファイルの読み込みに失敗しました");}};reader.readAsText(file);e.target.value="";},[setData]);

  const saveChar=useCallback(ch=>{ upd(p=>{ const chars=[...p.characters]; const i=chars.findIndex(c=>c.id===ch.id); if(i>=0) chars[i]=ch; else chars.push(ch); const syncedChars=chars.map(other=>{ if(other.id===ch.id) return other; const a=ch.relatedCharacters.find(r=>r.charId===other.id); const b=other.relatedCharacters.find(r=>r.charId===ch.id); if(a){ const recip={charId:ch.id,callName:a.calledName||"",calledName:a.callName||""}; if(b) return{...other,relatedCharacters:other.relatedCharacters.map(r=>r.charId===ch.id?recip:r)}; return{...other,relatedCharacters:[...other.relatedCharacters,recip]}; } else { if(b) return{...other,relatedCharacters:other.relatedCharacters.filter(r=>r.charId!==ch.id)}; return other; } }); const groups=p.groups.map(g=>{const linked=ch.relatedGroups.some(r=>r.groupId===g.id),has=g.relatedCharacters.includes(ch.id);if(linked&&!has) return{...g,relatedCharacters:[...g.relatedCharacters,ch.id]};if(!linked&&has) return{...g,relatedCharacters:g.relatedCharacters.filter(id=>id!==ch.id)};return g;}); return{...p,characters:syncedChars,groups}; }); setModal(null); },[upd]);
  const saveGroup=useCallback(g=>{upd(p=>{const groups=[...p.groups];const i=groups.findIndex(x=>x.id===g.id);if(i>=0)groups[i]=g;else groups.push(g);const characters=p.characters.map(ch=>{const inGroup=g.relatedCharacters.includes(ch.id),hasGroup=ch.relatedGroups.some(r=>r.groupId===g.id);if(inGroup&&!hasGroup) return{...ch,relatedGroups:[...ch.relatedGroups,{groupId:g.id,position:""}]};if(!inGroup&&hasGroup) return{...ch,relatedGroups:ch.relatedGroups.filter(r=>r.groupId!==g.id)};return ch;});return{...p,groups,characters};});setModal(null);},[upd]);
  const saveScene=useCallback(sc=>{upd(p=>{const scenes=[...p.scenes];const i=scenes.findIndex(s=>s.id===sc.id);if(i>=0)scenes[i]=sc;else scenes.push(sc);const chapters=p.chapters.map(ch=>{const linked=sc.relatedChapterId===ch.id,has=ch.relatedScenes.includes(sc.id);if(linked&&!has) return{...ch,relatedScenes:[...ch.relatedScenes,sc.id]};if(!linked&&has) return{...ch,relatedScenes:ch.relatedScenes.filter(id=>id!==sc.id)};return ch;});return{...p,scenes,chapters};});setModal(null);},[upd]);
  const saveChapter=useCallback(ch=>{upd(p=>{const chapters=[...p.chapters];const i=chapters.findIndex(c=>c.id===ch.id);if(i>=0)chapters[i]=ch;else chapters.push(ch);const scenes=p.scenes.map(sc=>{const inChap=ch.relatedScenes.includes(sc.id);if(inChap&&sc.relatedChapterId!==ch.id) return{...sc,relatedChapterId:ch.id};if(!inChap&&sc.relatedChapterId===ch.id) return{...sc,relatedChapterId:""};return sc;});return{...p,chapters,scenes};});setModal(null);},[upd]);

  const elements=[{key:"characters",label:"人物",icon:"person",color:"#E8916E"},{key:"groups",label:"集団",icon:"group",color:"#D9618A"},{key:"locations",label:"場所",icon:"pin",color:"#4CAF82"},{key:"scenes",label:"シーン",icon:"scene",color:"#5B9BD5"},{key:"chapters",label:"章",icon:"book",color:"#9B7DD4"},{key:"terms",label:"用語",icon:"term",color:"#C0392B"}];
  const subElements=[{key:"genders",label:"性別",icon:"gender",color:"#D9618A"},{key:"parameters",label:"パラメータ",icon:"param",color:"#7B8DA6"},{key:"abilityParams",label:"能力値チャート",icon:"radar",color:"#F59E0B"}];
  const GridView=({items})=>(<div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:C.border }}>{items.map(it=><button key={it.key} onClick={()=>setActiveView({type:it.key})} style={{ background:C.surface,border:"none",cursor:"pointer",padding:"24px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,fontFamily:"inherit" }}><div style={{ width:52,height:52,borderRadius:14,background:it.color+"18",display:"flex",alignItems:"center",justifyContent:"center" }}><Ico n={it.icon} s={24} c={it.color} sw={1.3}/></div><div style={{ fontSize:12,fontWeight:500,color:C.text }}>{it.label}</div><div style={{ fontSize:10,color:C.hint,background:C.tag,padding:"1px 6px",borderRadius:8 }}>{data[it.key]?data[it.key].length:0}</div></button>)}</div>);

  const renderView=()=>{
    if(!activeView){
      if(activeTab==="elements") return <div style={{ flex:1,overflowY:"auto" }}><GridView items={elements}/></div>;
      if(activeTab==="subElements") return <div style={{ flex:1,overflowY:"auto" }}><GridView items={subElements}/></div>;
      if(activeTab==="edit") return (<div style={{ flex:1,overflowY:"auto" }}>{[{key:"storySettings",label:"ストーリー設定",icon:"settings",desc:"タイトル・あらすじ・バックアップ"},{key:"chapters",label:"章と脚本",icon:"book",desc:"章の一覧・順序管理"},{key:"scenes",label:"シーンデザイナ",icon:"scene",desc:"シーンの詳細設計"}].map(it=>(<button key={it.key} onClick={()=>setActiveView({type:it.key})} style={{ width:"100%",padding:"16px",display:"flex",alignItems:"center",gap:12,background:C.surface,border:"none",borderBottom:`1px solid ${C.borderL}`,cursor:"pointer",fontFamily:"inherit",textAlign:"left" }}><Ico n={it.icon} s={18} c={C.hint}/><div><div style={{ fontSize:14,fontWeight:600,color:C.text }}>{it.label}</div><div style={{ fontSize:11,color:C.sub }}>{it.desc}</div></div><div style={{ marginLeft:"auto" }}><Ico n="chevR" s={14} c={C.hint}/></div></button>))}</div>);
      if(activeTab==="view") return <TimelineView data={data}/>;
      return null;
    }
    switch(activeView.type){
      case "storySettings": return (<div style={{ flex:1,overflowY:"auto",padding:16 }}><Inp label="ストーリータイトル" value={data.storyTitle} onChange={v=>upd(p=>({...p,storyTitle:v}))} placeholder="タイトルを入力..."/><Inp label="あらすじ" value={data.storySynopsis} onChange={v=>upd(p=>({...p,storySynopsis:v}))} rows={5} placeholder="ストーリーの概要..."/><Divider/><Field label="バックアップ"><div style={{ display:"flex",flexDirection:"column",gap:8 }}><Btn icon="download" onClick={exportData}>JSONでバックアップ</Btn><div><Btn icon="upload" onClick={()=>importRef.current.click()}>JSONを復元</Btn><input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleImport}/></div></div></Field><Divider/><Field label="エクスポート"><div style={{ display:"flex",flexDirection:"column",gap:8 }}><Btn icon="download" onClick={exportMarkdown}>Markdownで書き出し（.md）</Btn><div style={{ fontSize:11,color:C.hint,lineHeight:1.6 }}>登場人物・シーン・章・用語など全情報を書き出します。</div></div></Field></div>);
      case "characters": return <EntityList title="人物" icon="person" iconColor="#E8916E" items={data.characters} onAdd={()=>setModal({type:"character"})} onEdit={it=>setModal({type:"character",item:it})} onDelete={id=>del("characters",id)} renderName={charName} renderImage={c=>c.image||null} renderSubtitle={c=>{const g=data.genders.find(x=>x.id===c.genderId);return[g?g.name:null,c.birthday?`${c.birthday}生`:null].filter(Boolean).join(" · ")||null;}} renderTags={c=>c.relatedGroups.slice(0,2).map(r=>{const g=data.groups.find(x=>x.id===r.groupId);return g?{label:r.position?`${g.name}（${r.position}）`:g.name}:null;}).filter(Boolean)} onMoveUp={i=>moveEntity("characters",i,-1)} onMoveDown={i=>moveEntity("characters",i,1)}/>;
      case "groups": return <EntityList title="集団" icon="group" iconColor="#D9618A" items={data.groups} onAdd={()=>setModal({type:"group"})} onEdit={it=>setModal({type:"group",item:it})} onDelete={id=>del("groups",id)} renderName={g=>g.name||"（無名）"} renderSubtitle={g=>`${g.relatedCharacters.length}名が所属`} onMoveUp={i=>moveEntity("groups",i,-1)} onMoveDown={i=>moveEntity("groups",i,1)}/>;
      case "locations": return <EntityList title="場所" icon="pin" iconColor="#4CAF82" items={data.locations} onAdd={()=>setModal({type:"location"})} onEdit={it=>setModal({type:"location",item:it})} onDelete={id=>del("locations",id)} renderName={l=>l.name||"（無名）"} renderSubtitle={l=>l.description?l.description.slice(0,36):null} onMoveUp={i=>moveEntity("locations",i,-1)} onMoveDown={i=>moveEntity("locations",i,1)}/>;
      case "scenes": return <EntityList title="シーン" icon="scene" iconColor="#5B9BD5" items={data.scenes} onAdd={()=>setModal({type:"scene"})} onEdit={it=>setModal({type:"scene",item:it})} onDelete={id=>del("scenes",id)} renderName={s=>s.title||"（無題）"} renderSubtitle={s=>{const ch=data.chapters.find(c=>c.id===s.relatedChapterId);return[s.startDate,ch?ch.title:null,s.script?`${countChars(s.script)}字`:null].filter(Boolean).join(" · ")||null;}} onMoveUp={i=>moveEntity("scenes",i,-1)} onMoveDown={i=>moveEntity("scenes",i,1)}/>;
      case "chapters": return <EntityList title="章" icon="book" iconColor="#9B7DD4" items={data.chapters} onAdd={()=>setModal({type:"chapter"})} onEdit={it=>setModal({type:"chapter",item:it})} onDelete={id=>del("chapters",id)} renderName={c=>c.title||"（無題）"} renderSubtitle={c=>`${c.relatedScenes.length}シーン`} onMoveUp={i=>moveEntity("chapters",i,-1)} onMoveDown={i=>moveEntity("chapters",i,1)}/>;
      case "terms": return <EntityList title="用語" icon="term" iconColor="#C0392B" items={data.terms} onAdd={()=>setModal({type:"term"})} onEdit={it=>setModal({type:"term",item:it})} onDelete={id=>del("terms",id)} renderName={t=>t.name||"（無名）"} renderSubtitle={t=>t.description?t.description.slice(0,36):null} onMoveUp={i=>moveEntity("terms",i,-1)} onMoveDown={i=>moveEntity("terms",i,1)}/>;
      case "genders": return <EntityList title="性別" icon="gender" iconColor="#D9618A" items={data.genders} onAdd={()=>setModal({type:"gender"})} onEdit={it=>setModal({type:"gender",item:it})} onDelete={id=>del("genders",id)} renderName={g=>g.name||"（無名）"} renderSubtitle={g=>g.color} onMoveUp={i=>moveEntity("genders",i,-1)} onMoveDown={i=>moveEntity("genders",i,1)}/>;
      case "parameters": return <EntityList title="パラメータ" icon="param" iconColor="#7B8DA6" items={data.parameters} onAdd={()=>setModal({type:"parameter"})} onEdit={it=>setModal({type:"parameter",item:it})} onDelete={id=>del("parameters",id)} renderName={p=>p.name||"（無名）"} renderSubtitle={p=>p.description?p.description.slice(0,36):null} onMoveUp={i=>moveEntity("parameters",i,-1)} onMoveDown={i=>moveEntity("parameters",i,1)}/>;
      case "abilityParams": return <EntityList title="能力値チャート" icon="radar" iconColor="#F59E0B" items={data.abilityParams} onAdd={()=>setModal({type:"abilityParam"})} onEdit={it=>setModal({type:"abilityParam",item:it})} onDelete={id=>del("abilityParams",id)} renderName={p=>p.name||"（無名）"} renderSubtitle={()=>"人物の能力値チャートで使用"} onMoveUp={i=>moveEntity("abilityParams",i,-1)} onMoveDown={i=>moveEntity("abilityParams",i,1)}/>;
      default: return null;
    }
  };
  const renderModal=()=>{
    if(!modal) return null; const {type,item}=modal;
    const km={character:"characters",scene:"scenes",chapter:"chapters",group:"groups",location:"locations",term:"terms",gender:"genders",parameter:"parameters",abilityParam:"abilityParams"};
    const D=item?()=>del(km[type],item.id):null;
    if(type==="character") return <CharacterEdit char={item} data={data} onSave={saveChar} onClose={()=>setModal(null)} onDelete={D}/>;
    if(type==="scene") return <SceneEdit scene={item} data={data} onSave={saveScene} onClose={()=>setModal(null)} onDelete={D}/>;
    if(type==="chapter") return <ChapterEdit chapter={item} data={data} onSave={saveChapter} onClose={()=>setModal(null)} onDelete={D}/>;
    if(type==="group") return <SimpleEdit item={item} entityName="集団" data={data} onSave={g=>saveGroup({relatedCharacters:[],...g})} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"集団名",type:"text",placeholder:"例：冒険者ギルド"},{key:"description",label:"説明",type:"textarea",placeholder:"集団の説明..."},{key:"relatedCharacters",label:"所属人物",type:"links",dataKey:"characters",getLabel:charName,getColor:c=>c.imageColor},{key:"notes",label:"備考",type:"textarea",placeholder:"メモ..."}]}/>;
    if(type==="location") return <SimpleEdit item={item} entityName="場所" data={data} onSave={l=>{upsert("locations",l);setModal(null);}} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"場所名",type:"text",placeholder:"例：王都カルナ"},{key:"description",label:"説明",type:"textarea",placeholder:"説明..."},{key:"notes",label:"備考",type:"textarea",placeholder:"メモ..."}]}/>;
    if(type==="term") return <SimpleEdit item={item} entityName="用語" data={data} onSave={t=>{upsert("terms",t);setModal(null);}} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"用語名",type:"text",placeholder:"例：魔導石"},{key:"description",label:"説明",type:"textarea",placeholder:"説明..."},{key:"relatedCharacters",label:"関連人物",type:"links",dataKey:"characters",getLabel:charName,getColor:c=>c.imageColor},{key:"notes",label:"備考",type:"textarea",placeholder:"メモ..."}]}/>;
    if(type==="gender") return <SimpleEdit item={item} entityName="性別" data={data} onSave={g=>{upsert("genders",g);setModal(null);}} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"性別名",type:"text",placeholder:"例：男性 / 女性..."},{key:"color",label:"カラー",type:"color"}]}/>;
    if(type==="parameter") return <SimpleEdit item={item} entityName="パラメータ" data={data} onSave={p=>{upsert("parameters",p);setModal(null);}} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"パラメータ名",type:"text",placeholder:"例：好きな食べ物..."},{key:"description",label:"説明（任意）",type:"textarea",placeholder:"説明..."}]}/>;
    if(type==="abilityParam") return <SimpleEdit item={item} entityName="能力項目" data={data} onSave={p=>{upsert("abilityParams",p);setModal(null);}} onClose={()=>setModal(null)} onDelete={D} fields={[{key:"name",label:"項目名",type:"text",placeholder:"例：攻撃力、魔力、素早さ..."}]}/>;
    return null;
  };
  const navTabs=[{key:"elements",label:"要素",icon:"person"},{key:"subElements",label:"副要素",icon:"param"},{key:"edit",label:"編集",icon:"edit"},{key:"view",label:"ビュー",icon:"timeline"}];
  return (
    <div style={{ height:"100%",display:"flex",flexDirection:"column" }}>
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 12px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0 }}>
        {activeView?<button onClick={()=>setActiveView(null)} style={{ background:"none",border:"none",cursor:"pointer",padding:"6px 8px",display:"flex",alignItems:"center",gap:3 }}><Ico n="back" s={16} c={C.accent}/><span style={{ fontSize:12,color:C.accent }}>戻る</span></button>:<button onClick={onBack} style={{ background:"none",border:"none",cursor:"pointer",padding:"6px 8px",display:"flex",alignItems:"center",gap:3 }}><Ico n="home" s={16} c={C.accent}/><span style={{ fontSize:12,color:C.accent }}>一覧</span></button>}
        <div style={{ fontSize:14,fontWeight:700,color:C.text,letterSpacing:-0.3,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{data.storyTitle||"ストーリー"}</div>
        <div style={{ width:60,display:"flex",justifyContent:"flex-end" }}><span style={{ fontSize:10,color:C.hint,opacity:saveStatus==="saving"?1:0.6 }}>{saveStatus==="saving"?"保存中...":"✓ 保存済み"}</span></div>
      </div>
      <div style={{ flex:1,overflow:"hidden",display:"flex",flexDirection:"column" }}>{renderView()}</div>
      <div style={{ display:"flex",borderTop:`1px solid ${C.border}`,background:C.surface,flexShrink:0,paddingBottom:"env(safe-area-inset-bottom, 0px)" }}>
        {navTabs.map(t=>{const active=activeTab===t.key&&!activeView;return <button key={t.key} onClick={()=>{setActiveTab(t.key);setActiveView(null);}} style={{ flex:1,padding:"10px 4px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit" }}><Ico n={t.icon} s={21} c={active?C.accent:C.hint} sw={active?2:1.5}/><span style={{ fontSize:10,fontWeight:active?600:400,color:active?C.accent:C.hint }}>{t.label}</span></button>;})}
      </div>
      {renderModal()}
    </div>
  );
}

// ===================== ROOT APP =====================
function App() {
  const [session,setSession]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [stories,setStories]=useState(null);        // list [{id,title,sort_order,updated_at,_data}]
  const [openId,setOpenId]=useState(null);          // currently open story id
  const [openData,setOpenData]=useState(null);      // norm data of open story
  const [saveStatus,setSaveStatus]=useState("saved");
  const [screen,setScreen]=useState("list");        // list | editor | settings | ideas
  const [ideas,setIdeas]=useState([]);
  const [theme,setTheme]=useState(localStorage.getItem("sc_theme")||"mono");
  const [dark,setDark]=useState(localStorage.getItem("sc_dark")==="1");
  const [, forceRender]=useState(0);

  applyTheme(theme,dark);

  // auth
  useEffect(()=>{ db.auth.getSession().then(({data:{session}})=>{setSession(session);setAuthLoading(false);}); const {data:{subscription}}=db.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>subscription.unsubscribe(); },[]);

  // load stories + meta + migration
  useEffect(()=>{
    if(!session){ setStories(null); setOpenId(null); setOpenData(null); setIdeas([]); return; }
    (async()=>{
      try {
        // meta
        let { data:meta } = await db.from("user_meta").select("*").eq("user_id",session.user.id).maybeSingle();
        if(!meta){ await db.from("user_meta").insert({user_id:session.user.id,ideas:[],settings:{}}); meta={ideas:[],settings:{}}; }
        setIdeas(meta.ideas||[]);
        if(meta.settings){ if(meta.settings.theme){ setTheme(meta.settings.theme); localStorage.setItem("sc_theme",meta.settings.theme);} if(typeof meta.settings.darkMode==="boolean"){ setDark(meta.settings.darkMode); localStorage.setItem("sc_dark",meta.settings.darkMode?"1":"0"); } }
        // stories: LIGHT list only (no data column) for fast load
        let { data:rows } = await db.from("stories").select("id,title,sort_order,updated_at,summary").eq("user_id",session.user.id).order("sort_order",{ascending:true});
        // migration from legacy story_data
        if((!rows||rows.length===0)){
          const { data:legacy } = await db.from("story_data").select("data").eq("user_id",session.user.id).limit(1);
          if(legacy&&legacy.length>0&&legacy[0].data){
            const d=norm(legacy[0].data);
            const { data:ins } = await db.from("stories").insert({user_id:session.user.id,title:d.storyTitle||"新しいストーリー",data:d,sort_order:0,summary:mkSummary(d)}).select("id,title,sort_order,updated_at,summary").single();
            rows=ins?[ins]:[];
          }
        }
        setStories((rows||[]).map(r=>({ id:r.id,title:r.title,sort_order:r.sort_order,updated_at:r.updated_at,summary:r.summary||null })));
      } catch(e){ console.error(e); setStories([]); }
    })();
  },[session]);

  // autosave open story
  useEffect(()=>{
    if(!openData||!openId||!session) return;
    setSaveStatus("saving");
    const t=setTimeout(async()=>{
      const summary=mkSummary(openData);
      await db.from("stories").update({ data:openData, title:openData.storyTitle||"新しいストーリー", summary, updated_at:new Date().toISOString() }).eq("id",openId);
      setStories(prev=>prev?prev.map(s=>s.id===openId?{...s,title:openData.storyTitle,summary,updated_at:new Date().toISOString()}:s):prev);
      setSaveStatus("saved");
    },1500);
    return ()=>clearTimeout(t);
  },[openData]);

  const saveMeta=useCallback(async(patch)=>{ if(!session) return; await db.from("user_meta").update({...patch,updated_at:new Date().toISOString()}).eq("user_id",session.user.id); },[session]);

  const changeTheme=(k)=>{ setTheme(k); localStorage.setItem("sc_theme",k); applyTheme(k,dark); forceRender(x=>x+1); saveMeta({settings:{theme:k,darkMode:dark}}); };
  const changeDark=(v)=>{ setDark(v); localStorage.setItem("sc_dark",v?"1":"0"); applyTheme(theme,v); forceRender(x=>x+1); saveMeta({settings:{theme,darkMode:v}}); };

  // lazy-load full story data on open
  const openStory=async(id)=>{
    setScreen("editor"); setOpenId(id); setOpenData(null);
    const { data:row } = await db.from("stories").select("data").eq("id",id).single();
    setOpenData(norm(row?row.data:{}));
  };
  const backToList=()=>{ setScreen("list"); setOpenId(null); setOpenData(null); };

  const createStory=async()=>{
    const d=norm({}); d.storyTitle="新しい作品";
    const maxOrder=stories.reduce((m,s)=>Math.max(m,s.sort_order),-1);
    const { data:ins } = await db.from("stories").insert({user_id:session.user.id,title:d.storyTitle,data:d,sort_order:maxOrder+1,summary:mkSummary(d)}).select("id,title,sort_order,updated_at,summary").single();
    if(ins){ setStories([...stories,{id:ins.id,title:ins.title,sort_order:ins.sort_order,updated_at:ins.updated_at,summary:ins.summary}]); setScreen("editor"); setOpenId(ins.id); setOpenData(d); }
  };
  const duplicateStory=async(id)=>{
    const { data:src } = await db.from("stories").select("data,title").eq("id",id).single();
    if(!src) return;
    const d={...norm(src.data),storyTitle:`${src.title}のコピー`};
    const maxOrder=stories.reduce((m,s)=>Math.max(m,s.sort_order),-1);
    const { data:ins } = await db.from("stories").insert({user_id:session.user.id,title:d.storyTitle,data:d,sort_order:maxOrder+1,summary:mkSummary(d)}).select("id,title,sort_order,updated_at,summary").single();
    if(ins) setStories([...stories,{id:ins.id,title:ins.title,sort_order:ins.sort_order,updated_at:ins.updated_at,summary:ins.summary}]);
  };
  const deleteStory=async(id)=>{ await db.from("stories").delete().eq("id",id); setStories(stories.filter(s=>s.id!==id)); };
  const renameStory=async(id,title)=>{ const t=title.trim()||"（無題）"; await db.from("stories").update({title:t}).eq("id",id); setStories(stories.map(s=>s.id===id?{...s,title:t}:s)); };
  const moveStory=async(idx,dir)=>{
    const arr=[...stories]; const ni=idx+dir; if(ni<0||ni>=arr.length) return;
    [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
    const reordered=arr.map((s,i)=>({...s,sort_order:i}));
    setStories(reordered);
    for(const s of reordered){ await db.from("stories").update({sort_order:s.sort_order}).eq("id",s.id); }
  };

  const addIdea=async(text)=>{ const next=[...ideas,{id:uid(),text,tags:[],createdAt:new Date().toISOString(),linkedStoryId:null}]; setIdeas(next); await saveMeta({ideas:next}); };
  const deleteIdea=async(id)=>{ const next=ideas.filter(i=>i.id!==id); setIdeas(next); await saveMeta({ideas:next}); };

  if(authLoading) return <div style={{ height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg }}><div style={{ fontSize:13,color:C.hint }}>読み込み中...</div></div>;
  if(!session) return <div style={{ height:"100%",maxWidth:480,margin:"0 auto",background:C.bg }}><LoginScreen/></div>;
  if(stories===null) return <div style={{ height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg }}><div style={{ fontSize:13,color:C.hint }}>データを読み込み中...</div></div>;

  return (
    <div style={{ height:"100%",maxWidth:480,margin:"0 auto",background:C.bg,position:"relative",overflow:"hidden" }}>
      {screen==="list"&&<StoryList stories={stories} onOpen={openStory} onCreate={createStory} onDuplicate={duplicateStory} onDelete={deleteStory} onRename={renameStory} onMove={moveStory} onOpenSettings={()=>setScreen("settings")} onOpenIdeas={()=>setScreen("ideas")}/>}
      {screen==="editor"&&(openData?<StoryEditor data={openData} setData={setOpenData} onBack={backToList} saveStatus={saveStatus}/>:<div style={{ height:"100%",display:"flex",alignItems:"center",justifyContent:"center" }}><div style={{ fontSize:13,color:C.hint }}>作品を読み込み中...</div></div>)}
      {screen==="settings"&&<SettingsScreen onBack={()=>setScreen("list")} theme={theme} dark={dark} onTheme={changeTheme} onDark={changeDark} email={session.user.email} onLogout={()=>db.auth.signOut()}/>}
      {screen==="ideas"&&<IdeasScreen onBack={()=>setScreen("list")} ideas={ideas} onAdd={addIdea} onDelete={deleteIdea}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
